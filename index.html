                setLoading(true);
                try {
                    const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';
                    await window.FB.addDoc(window.FB.collection(window.FB.db, 'artifacts', appId, 'public', 'data', 'forum_topics'), {
                        title: newTitle, content: newContent, author: isAnon ? 'אנונימי' : user.name, realAuthor: user.name,
                        date: new Date().toISOString(), isAnonymous: isAnon, replies: [], isAdminPost: user.isAdmin

                    setNewTitle(""); setNewContent(""); setIsFormOpen(false);

                setLoading(false);

            const handleReply = async (e) => {
                e.preventDefault();

                setLoading(true);
                const updatedReplies = [...(currentTopic.replies || []), {
                    id: Date.now().toString(), content: newReply, author: isAnon ? 'אנונימי' : user.name, realAuthor: user.name,

                                <textarea value={newContent} onChange={e=>setNewContent(e.target.value)} required placeholder="פרטו כאן את השאלה או הדילמה שלכם..." className="w-full p-3 rounded-xl border border-gray-200 dark:border-gray-600 bg-gray-50 dark:bg-gray-900 h-24 outline-none text-gray-800 dark:text-white focus:border-brand-primary resize-none text-sm"></textarea>

                    try {
                        const rss = `https://www.youtube.com/feeds/videos.xml?channel_id=UC_x5XG1OV2P6uZZ5FSM9Ttw`; 
                        const api = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(rss)}`;
                        const res = await fetch(api);

                        if (data.status === 'ok') setVideos(data.items.map((i, idx) => ({ id: `yt_${idx}`, name: i.title, url: i.link, thumbnail: i.thumbnail, type: 'youtube' })));
                    } catch (e) {}
                    setLoading(false);

                fetchYT();

        const AdminPage = ({ forumTopics, setMessage }) => {
            const [userEmailToUpgrade, setUserEmailToUpgrade] = React.useState("");

            const handleDeleteTopic = async (topic) => {
                if(!confirm("מחיקת נושא זה תסיר אותו לצמיתות מהענן. להמשיך?")) return;
                try {
                    await window.FB.deleteDoc(window.FB.doc(window.FB.db, 'pisga_forum', topic.id));
                    setMessage("הנושא נמחק בהצלחה.");
                } catch (e) { alert("שגיאה: " + e.message); }
            };

            const handleDeleteReply = async (topic, reply) => {
                if(!confirm("האם למחוק תגובה זו?")) return;
                try {
                    const updatedReplies = topic.replies.filter(r => r.id !== reply.id);
                    await window.FB.updateDoc(window.FB.doc(window.FB.db, 'pisga_forum', topic.id), { replies: updatedReplies });
                    setMessage("התגובה נמחקה בהצלחה.");
                } catch (e) { alert("שגיאה במחיקת תגובה."); }
            };

            const handleManualUpgrade = async (e) => {
                e.preventDefault();
                if(!userEmailToUpgrade) return;
                try {
                    const userRef = window.FB.doc(window.FB.db, 'pro_users', userEmailToUpgrade.toLowerCase().trim());
                    await window.FB.setDoc(userRef, { isPro: true, addedAt: new Date().toISOString(), method: 'manual_admin' });
                    setMessage(`האימייל ${userEmailToUpgrade} הוגדר בהצלחה כמנוי Pro.`);

                            <button type="submit" className="bg-brand-primary hover:bg-brand-dark text-white px-6 py-3 rounded-xl font-bold transition-colors shadow-md text-sm">הוסף הרשאת מנוי</button>

                    {/* Forum Management */}
                    <div className="bg-white dark:bg-gray-800 rounded-3xl p-6 md:p-8 border border-brand-primary/20 shadow-sm">

                        <div className="space-y-4">

                                    {topic.replies && topic.replies.length > 0 && (
                                        <div className="bg-white dark:bg-gray-800 rounded-xl p-3 space-y-2 border border-gray-100 dark:border-gray-700">
                                            <h4 className="text-xs font-bold text-gray-400 mb-2">תגובות:</h4>
                                            {topic.replies.map(reply => (
                                                <div key={reply.id} className="flex justify-between items-center bg-gray-50 dark:bg-gray-900 p-2.5 rounded-lg border border-gray-100 dark:border-gray-800">
                                                    <div>
                                                        <p className="text-gray-800 dark:text-gray-200 text-xs">{reply.content}</p>
                                                        <span className="text-[10px] text-gray-500 mt-1 block">מאת: {reply.realAuthor}</span>
                                                    </div>
                                                    <button onClick={() => handleDeleteReply(topic, reply)} className="text-gray-400 hover:text-red-500 hover:bg-red-50 dark:hover:bg-gray-800 p-1.5 rounded-lg transition" title="מחק תגובה">
                                                        <Icon name="X" size={16} />
                                                    </button>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </div>
                            ))}
                            {forumTopics.length === 0 && <p className="text-center text-gray-500 text-sm font-bold">אין נושאים בפורום.</p>}
                        </div>
                    </div>
                </div>
            );
        };

        const ProfilePage = ({ user, setAlertMsg }) => {
            const [newPassword, setNewPassword] = React.useState("");
            const [loading, setLoading] = React.useState(false);

            const handlePasswordChange = async (e) => {
                e.preventDefault();
                if (!window.FB || !window.FB.auth.currentUser) return;
                setLoading(true);
                try {
                    await window.FB.updatePassword(window.FB.auth.currentUser, newPassword);
                    setAlertMsg({t: "הצלחה", m: "הסיסמה שונתה בהצלחה!"});
                    setNewPassword("");
                } catch (error) {
                    if (error.code === 'auth/requires-recent-login') {
                        setAlertMsg({t: "שגיאת אבטחה", m: "כדי לשנות סיסמה, יש להתנתק מהחשבון ולהתחבר מחדש (מטעמי אבטחה של גוגל), ואז לנסות שוב."});
                    } else if (error.code === 'auth/weak-password') {
                        setAlertMsg({t: "שגיאה", m: "הסיסמה חלשה מדי (לפחות 6 תווים)."});
                    } else {
                        setAlertMsg({t: "שגיאה", m: "אירעה שגיאה בשינוי הסיסמה."});
                    }
                }
                setLoading(false);
            };

            const sendResetEmail = async () => {
                if(!window.FB || !user?.email) return;
                try {
                    await window.FB.sendPasswordResetEmail(window.FB.auth, user.email);
                    setAlertMsg({t: "מייל נשלח", m: "קישור לאיפוס סיסמה נשלח לתיבת הדואר שלך."});
                } catch(e) {
                    setAlertMsg({t: "שגיאה", m: "אירעה שגיאה בשליחת המייל."});
                }
            }

            return (
                <div className="max-w-3xl mx-auto p-4 space-y-6 pb-12 animate-fade-in">
                    <div className="bg-white dark:bg-gray-800 rounded-3xl p-6 md:p-10 border border-gray-100 dark:border-gray-700 shadow-sm text-center">
                        <div className="w-20 h-20 bg-brand-primary/10 rounded-full flex items-center justify-center mx-auto mb-4 text-brand-primary">
                            <Icon name="User" size={40} />
                        </div>
                        <h2 className="text-2xl font-black text-gray-800 dark:text-white mb-1">{user?.name}</h2>
                        <p className="text-gray-500 mb-4">{user?.email}</p>
                        
                        <div className="inline-flex items-center gap-2 px-4 py-2 rounded-full bg-gray-50 dark:bg-gray-900 border border-gray-200 dark:border-gray-700 text-sm font-bold">
                            סטטוס חשבון: {user?.isAdmin ? <span className="text-brand-primary">מנהל מערכת</span> : user?.isSubscribed ? <span className="text-brand-secondary">מנוי Pro פעיל</span> : <span className="text-gray-500">חשבון חינמי</span>}
                        </div>
                    </div>

                    <div className="bg-white dark:bg-gray-800 rounded-3xl p-6 md:p-8 border border-gray-100 dark:border-gray-700 shadow-sm">
                        <div className="flex items-center gap-3 mb-6 border-b border-gray-100 dark:border-gray-700 pb-4">
                            <Icon name="Key" className="text-brand-secondary" size={24} />
                            <h3 className="text-xl font-black text-gray-800 dark:text-white">אבטחה וסיסמה</h3>
                        </div>
                        <div className="text-sm text-gray-600 dark:text-gray-400 mb-6 bg-blue-50 dark:bg-blue-900/20 p-4 rounded-xl border border-blue-100 dark:border-blue-900/50">
                            <p className="font-bold flex items-center gap-2 mb-1"><Icon name="Info" size={16}/> מידע חשוב על סיסמאות</p>
                            מטעמי אבטחת מידע קפדניים של מערכות גוגל (Firebase), הסיסמה שלך מוצפנת בשרת ולא ניתנת לצפייה על ידי אף אדם (גם לא על ידי מנהל האתר). עם זאת, תוכל לשנות אותה בקלות.
                        </div>

                        <form onSubmit={handlePasswordChange} className="space-y-4 max-w-sm">
                            <div>
                                <label className="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">הזן סיסמה חדשה</label>
                                <input type="password" required value={newPassword} onChange={e => setNewPassword(e.target.value)} placeholder="לפחות 6 תווים" className="w-full border border-gray-300 dark:border-gray-600 bg-gray-50 dark:bg-gray-900 text-gray-800 dark:text-white rounded-xl px-4 py-2.5 focus:border-brand-primary outline-none text-left" dir="ltr" />
                            </div>
                            <button type="submit" disabled={loading} className="bg-brand-primary hover:bg-brand-dark text-white px-6 py-2.5 rounded-xl font-bold transition-colors text-sm flex items-center justify-center gap-2 w-full sm:w-auto">
                                {loading ? <Icon name="RefreshCw" size={16} className="animate-spin" /> : null} שנה סיסמה עכשיו
                            </button>
                        </form>
                        
                        <div className="mt-6 pt-4 border-t border-gray-100 dark:border-gray-700">
                            <button onClick={sendResetEmail} className="text-sm text-brand-secondary font-bold hover:underline">לחלופין: שלח לי קישור איפוס למייל</button>
                        </div>
                    </div>
                </div>
            )
        };

        const GlobalFileViewer = ({ file, onClose }) => {
            if (!file) return null;
            const getUrl = (f) => {
                if (f.url.includes('youtube.com') || f.url.includes('youtu.be')) {
                    const id = f.url.match(/(?:youtu\.be\/|youtube\.com\/(?:embed\/|v\/|watch\?v=|watch\?.+&v=))([^&]{11})/);
                    return id ? `https://www.youtube.com/embed/${id[1]}?autoplay=1` : f.url;
                }
                return f.url.replace('/view', '/preview');
            };
            return (
                <div className="fixed inset-0 z-[9999] flex items-center justify-center bg-black/90 p-2 sm:p-8 animate-fade-in">
                    <div className="bg-black w-full max-w-6xl h-full md:h-[85vh] rounded-3xl overflow-hidden flex flex-col shadow-2xl border border-gray-800">
                        <div className="bg-gray-900 text-white p-4 flex justify-between items-center border-b border-gray-800">
                            <h3 className="font-bold text-sm sm:text-base truncate pr-4">{file.name}</h3>
                            <button onClick={onClose} className="p-2 bg-gray-800 hover:bg-gray-700 rounded-full transition-colors"><Icon name="X" size={20}/></button>
                        </div>
                        <iframe src={getUrl(file)} className="flex-1 w-full h-full border-none bg-black" allow="autoplay; fullscreen" allowFullScreen></iframe>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [showSplash, setShowSplash] = React.useState(true);
            const [user, setUser] = React.useState(() => JSON.parse(localStorage.getItem('pisga_user')) || null);
            const [courses, setCourses] = React.useState(INITIAL_COURSES);
            const [forumTopics, setForumTopics] = React.useState([]);
            const [currentPage, setCurrentPage] = React.useState('home');
            const [globalFile, setGlobalFile] = React.useState(null);
            const [alertMsg, setAlertMsg] = React.useState(null);
            
            const [isDarkMode, setIsDarkMode] = React.useState(() => localStorage.getItem('darkMode') === 'true');
            const [showA11y, setShowA11y] = React.useState(false);
            const [isMobileMenuOpen, setIsMobileMenuOpen] = React.useState(false);
            const [showUserMenu, setShowUserMenu] = React.useState(false);
            const [showBackToTop, setShowBackToTop] = React.useState(false);

            // REAL AUTH STATE
            const [showAuthModal, setShowAuthModal] = React.useState(false);
            const [showPaymentModal, setShowPaymentModal] = React.useState(false);
            const [authMode, setAuthMode] = React.useState('login');
            const [authEmail, setAuthEmail] = React.useState('');
            const [authPassword, setAuthPassword] = React.useState('');
            const [authName, setAuthName] = React.useState('');
            const [authPassAdmin, setAuthPassAdmin] = React.useState('');
            const [authError, setAuthError] = React.useState('');
            const [authLoading, setAuthLoading] = React.useState(false);

            React.useEffect(() => { setTimeout(() => setShowSplash(false), 2000); }, []);
            React.useEffect(() => { document.documentElement.classList.toggle('dark', isDarkMode); localStorage.setItem('darkMode', isDarkMode); }, [isDarkMode]);
            React.useEffect(() => { const h = () => setShowBackToTop(window.scrollY > 300); window.addEventListener('scroll', h); return () => window.removeEventListener('scroll', h); }, []);

            // Firebase Live Data & Drive Sync
            React.useEffect(() => {
                if (DRIVE_SCRIPT_URL && DRIVE_SCRIPT_URL.startsWith('http')) {
                    fetch(DRIVE_SCRIPT_URL)
                        .then(res => res.json())
                        .then(data => { if (data && Array.isArray(data) && data.length > 0) setCourses(data); })
                        .catch(e => console.log("Drive Sync Error:", e));
                }

                if (!window.FB) return;
                
                let unsubPro = () => {};

                const unsubscribeAuth = window.FB.onAuthStateChanged(window.FB.auth, async (fbUser) => {
                    if (fbUser && fbUser.email) {
                        const isAdmin = fbUser.email.toLowerCase() === 'zwolner@gmail.com';
                        const proRef = window.FB.doc(window.FB.db, 'pro_users', fbUser.email.toLowerCase());
                        
                        unsubPro = window.FB.onSnapshot(proRef, (proDoc) => {
                            const isPro = proDoc.exists() || isAdmin;
                            const u = { name: fbUser.displayName || 'משתמש', email: fbUser.email, isAdmin: isAdmin, isSubscribed: isPro, uid: fbUser.uid };
                            setUser(u);
                            localStorage.setItem('pisga_user', JSON.stringify(u));
                        });
                    } else {
                        unsubPro();
                        if (!fbUser) window.FB.signInAnonymously(window.FB.auth).catch(e => console.log(e));
                        else setUser(null); 
                    }
                });

                const q = window.FB.query(window.FB.collection(window.FB.db, 'pisga_forum'));
                const unsubForum = window.FB.onSnapshot(q, s => {
                    const list = [];
                    s.forEach(d => list.push({ id: d.id, ...d.data() }));
                    setForumTopics(list.sort((a,b) => new Date(b.date) - new Date(a.date)));
                });
                
                return () => { unsubscribeAuth(); unsubPro(); unsubForum(); };
            }, []);

            const handleAuth = async (e) => {
                e.preventDefault(); setAuthError(''); setAuthLoading(true);
                if (!window.FB) { setAuthError("אין חיבור לשרת."); setAuthLoading(false); return; }

                let isAdmin = false;
                if (authEmail.toLowerCase() === "zwolner@gmail.com") {
                    isAdmin = true; 
                }

                try {
                    if (authMode === 'register') {
                        const res = await window.FB.createUserWithEmailAndPassword(window.FB.auth, authEmail, authPassword);
                        await window.FB.updateProfile(res.user, { displayName: authName });
                        setAlertMsg({t: "ברוכים הבאים!", m: "החשבון נוצר בהצלחה."});
                    } else if (authMode === 'login') {
                        await window.FB.signInWithEmailAndPassword(window.FB.auth, authEmail, authPassword);
                    } else if (authMode === 'forgot_password') {
                        await window.FB.sendPasswordResetEmail(window.FB.auth, authEmail);
                        setAlertMsg({t: "נשלח מייל", m: "קישור לאיפוס סיסמה נשלח לכתובת המייל שלך."});
                        setAuthMode('login');
                    }
                    setShowAuthModal(false);
                } catch (error) {
                    if (error.code === 'auth/email-already-in-use') setAuthError("כתובת המייל כבר קיימת במערכת.");
                    else if (error.code === 'auth/wrong-password' || error.code === 'auth/user-not-found' || error.code === 'auth/invalid-credential') setAuthError("אימייל או סיסמה שגויים.");
                    else if (error.code === 'auth/weak-password') setAuthError("הסיסמה חלשה מדי (לפחות 6 תווים).");
                    else setAuthError("שגיאה בתהליך. אנא נסה שוב.");
                }
                setAuthLoading(false);
            };

            const handleGoogleLogin = async () => {
                 setAuthError(''); setAuthLoading(true);
                 try {
                     const res = await window.FB.signInWithPopup(window.FB.auth, window.FB.googleProvider);
                     
                     // בדיקה בשרת האם המשתמש של גוגל כבר מוגדר כ-Pro או מנהל
                     const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';
                     const isAdmin = res.user.email?.toLowerCase() === 'zwolner@gmail.com';
                     const proRef = window.FB.doc(window.FB.db, 'artifacts', appId, 'public', 'data', 'pro_users', res.user.email?.toLowerCase() || 'unknown');
                     const proDoc = await window.FB.getDoc(proRef);
                     const isPro = proDoc.exists() || isAdmin;
                     
                     const u = { name: res.user.displayName || 'משתמש', email: res.user.email, isAdmin: isAdmin, isSubscribed: isPro, uid: res.user.uid };
                     setUser(u);
                     localStorage.setItem('pisga_user', JSON.stringify(u));
                     
                     setShowAuthModal(false);
                 } catch (error) {
                     console.error("Google Auth Error:", error);
                     if (error.code === 'auth/popup-closed-by-user') setAuthError("חלון ההתחברות של גוגל נסגר לפני סיום התהליך.");
                     else if (error.code === 'auth/operation-not-allowed') setAuthError("שגיאה: התחברות גוגל לא הופעלה במסד הנתונים (Firebase).");
                     else setAuthError("שגיאה בהתחברות עם גוגל: " + error.message);
                 }
                 setAuthLoading(false);
            }

            const handlePaymentSuccess = async (id) => {
                if(!user || !user.email) return;
                try {
                    const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';
                    const proRef = window.FB.doc(window.FB.db, 'artifacts', appId, 'public', 'data', 'pro_users', user.email.toLowerCase());
                    await window.FB.setDoc(proRef, { isPro: true, paypalId: id, updatedAt: new Date().toISOString() });
                    setShowPaymentModal(false);
                    setAlertMsg({t:"תודה על רכישתך!", m:"מנוי ה-Pro שלך הופעל בהצלחה. כל הקורסים פתוחים עבורך."});
                } catch(e) { alert("שגיאה בעדכון השרת."); }
            };

            const toggleA11yMenu = () => setShowA11y(!showA11y);
            const navigate = (id) => { window.location.hash = id; setCurrentPage(id); setIsMobileMenuOpen(false); setShowUserMenu(false); };
            React.useEffect(() => { const h = window.location.hash.replace('#','') || 'home'; setCurrentPage(h); }, []);

            const navItems = [
                {id:'home', l:'ראשי', i:'Home'},
                {id:'youtube', l:'תכנים חינמיים', i:'Youtube'},
                {id:'courses', l:'קורסים בתשלום', i:'PlayCircle'}, 
                {id:'forum', l:'הקהילה שלנו', i:'MessageSquare'}
            ];

            return (
                <div className="min-h-screen flex flex-col bg-gray-50 dark:bg-[#0b1b24] font-sans relative">
                    {showSplash && <SplashScreen />}
                    {alertMsg && <CustomMessageBox title={alertMsg.t} message={alertMsg.m} onClose={()=>setAlertMsg(null)} />}
                    <GlobalFileViewer file={globalFile} onClose={()=>setGlobalFile(null)} />
                    
                    <header className="bg-white dark:bg-gray-900 shadow-sm sticky top-0 z-50 border-b-4 border-brand-secondary h-16 sm:h-20 flex items-center transition-all">
                        <div className="max-w-7xl mx-auto px-3 sm:px-4 w-full flex justify-between items-center h-full relative">
                            <div onClick={()=>navigate('home')} className="flex items-center gap-1.5 sm:gap-3 cursor-pointer shrink-0 h-full py-2">
                                <img src={LOGO_URL} alt="לוגו המועדון" className="h-8 sm:h-12 w-auto object-contain" onError={(e) => { e.target.style.display='none'; }} />
                                <h1 className="font-black text-xl sm:text-2xl text-brand-primary dark:text-white hidden sm:block">פסגה</h1>
                            </div>
                            <nav className="hidden lg:flex gap-1 overflow-x-auto scrollbar-hide px-2 items-center justify-center flex-1 h-full">
                                {navItems.map(n => (
                                    <button key={n.id} onClick={()=>navigate(n.id)} className={`px-3 sm:px-4 py-2 rounded-xl font-bold text-sm flex items-center gap-1.5 transition-all duration-300 ${currentPage===n.id ? 'bg-brand-primary/10 text-brand-primary dark:bg-brand-secondary/20 dark:text-brand-secondary' : 'text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-800 hover:text-brand-primary'}`}>
                                        <Icon name={n.i} size={16}/> {n.l}
                                    </button>
                                ))}
                                {user?.isAdmin && <button onClick={()=>navigate('admin')} className="px-3 sm:px-4 py-2 rounded-xl font-bold text-sm bg-gray-800 hover:bg-gray-700 text-white flex items-center gap-1.5 transition-colors"><Icon name="Settings" size={16}/> ניהול</button>}
                            </nav>
                            <div className="flex items-center gap-2 sm:gap-3 shrink-0 h-full py-2">
                                {!user ? <button onClick={()=>{setAuthMode('login'); setShowAuthModal(true); setAuthError('');}} className="text-xs sm:text-sm font-bold text-brand-primary border border-brand-primary/30 px-3 sm:px-5 py-1.5 sm:py-2 rounded-xl hover:bg-brand-primary hover:text-white transition-colors shadow-sm whitespace-nowrap">התחברות</button> : 
                                <div className="relative">
                                    <button onClick={()=>setShowUserMenu(!showUserMenu)} className="flex items-center gap-1.5 sm:gap-2 bg-gray-100 dark:bg-gray-800 p-1 pl-2 sm:pl-3 pr-1 rounded-full border border-gray-200 dark:border-gray-700 shadow-sm hover:border-brand-primary transition-colors">
                                        <div className="w-6 h-6 sm:w-7 sm:h-7 rounded-full bg-brand-primary text-white flex items-center justify-center text-[10px] sm:text-xs shrink-0"><Icon name="User" size={14}/></div>
                                        <span className="text-xs sm:text-sm font-bold text-gray-800 dark:text-gray-200 truncate max-w-[65px] sm:max-w-[100px]">{user.name}</span>
                                    </button>
                                    {showUserMenu && (
                                        <div className="absolute top-full left-0 mt-2 w-48 bg-white dark:bg-gray-800 rounded-xl shadow-xl border border-gray-100 dark:border-gray-700 p-2 flex flex-col gap-1 z-50 animate-fade-in">
                                            <div className="px-3 py-2 border-b border-gray-100 dark:border-gray-700 mb-1">
                                                <p className="text-xs text-gray-500 truncate">{user.email}</p>
                                            </div>
                                            <button onClick={()=>navigate('profile')} className="w-full text-right px-3 py-2 rounded-lg text-sm font-bold text-gray-700 dark:text-gray-200 hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors flex items-center gap-2"><Icon name="User" size={16}/> הפרופיל שלי</button>
                                            <button onClick={()=>{localStorage.removeItem('pisga_user'); window.FB.auth.signOut(); setUser(null); setShowUserMenu(false); navigate('home');}} className="w-full text-right px-3 py-2 rounded-lg text-sm font-bold text-red-500 hover:bg-red-50 dark:hover:bg-red-900/20 transition-colors flex items-center gap-2"><Icon name="LogOut" size={16}/> יציאה מהחשבון</button>
                                        </div>
                                    )}
                                </div>}
                                <div className="flex items-center gap-0.5 hidden sm:flex">
                                    <button onClick={() => setIsDarkMode(!isDarkMode)} className="p-2 text-gray-500 hover:text-brand-primary dark:hover:text-white rounded-full bg-gray-50 dark:bg-gray-800 transition-colors"><Icon name={isDarkMode ? "Sun" : "Moon"} size={18} /></button>
                                    <button onClick={toggleA11yMenu} className="p-2 text-gray-500 hover:text-brand-primary dark:hover:text-white rounded-full bg-gray-50 dark:bg-gray-800 transition-colors"><Icon name="Accessibility" size={18} /></button>
                                </div>
                                <button onClick={()=>setIsMobileMenuOpen(!isMobileMenuOpen)} className="lg:hidden p-1.5 text-brand-primary dark:text-white shrink-0"><Icon name={isMobileMenuOpen ? "X" : "Menu"} size={26}/></button>
                            </div>
                        </div>

                        {/* תפריט מובייל - חייב להיות בתוך ההדר כדי שיגלל איתו */}
                        {isMobileMenuOpen && (
                            <div className="lg:hidden bg-white dark:bg-gray-900 border-b border-gray-100 dark:border-gray-800 shadow-xl p-4 space-y-2 absolute w-full top-full left-0 z-40 max-h-[85vh] overflow-y-auto">
                                {navItems.map(item => (
                                    <button key={item.id} onClick={() => navigate(item.id)} className="w-full text-right p-3 rounded-xl font-bold text-gray-700 dark:text-gray-200 hover:bg-gray-50 dark:hover:bg-gray-800 flex items-center gap-3"><Icon name={item.icon || item.i} size={18}/> {item.label || item.l}</button>
                                ))}
                                {user && <button onClick={() => navigate('profile')} className="w-full text-right p-3 rounded-xl font-bold text-gray-700 dark:text-gray-200 hover:bg-gray-50 dark:hover:bg-gray-800 flex items-center gap-3 border-t border-gray-100 dark:border-gray-700 mt-2 pt-4"><Icon name="User" size={18}/> הפרופיל שלי</button>}
                                {user?.isAdmin && <button onClick={() => navigate('admin')} className="w-full text-right p-3 rounded-xl font-bold text-brand-primary flex items-center gap-3 border-t border-gray-100 dark:border-gray-700 mt-2 pt-4"><Icon name="Settings" size={18}/> ניהול מערכת</button>}
                            </div>
                        )}
                    </header>

                    {showAuthModal && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center bg-black/60 backdrop-blur-sm p-4 animate-fade-in">
                            <div className="bg-white dark:bg-gray-800 rounded-3xl p-6 md:p-8 max-w-sm w-full text-center relative shadow-2xl border border-gray-200 dark:border-gray-700">
                                <button onClick={() => setShowAuthModal(false)} className="absolute top-4 left-4 text-gray-400 hover:text-gray-800 dark:hover:text-white bg-gray-100 dark:bg-gray-700 p-2 rounded-full transition-colors"><Icon name="X" size={18} /></button>
                                <Icon name={authMode === 'forgot_password' ? 'Mail' : 'User'} size={32} className="mx-auto mb-3 text-brand-primary dark:text-brand-secondary" />
                                <h3 className="text-xl font-black mb-1 text-gray-800 dark:text-white">{authMode === 'login' ? 'התחברות לחשבון' : authMode === 'register' ? 'הרשמה למערכת' : 'איפוס סיסמה'}</h3>
                                
                                <form onSubmit={handleAuth} className="space-y-3 text-right animate-fade-in mt-4">
                                    {authMode === 'register' && (
                                        <div>
                                            <label className="block text-xs font-medium text-gray-700 dark:text-gray-300 mb-1">שם מלא</label>
                                            <input type="text" required value={authName} onChange={e => setAuthName(e.target.value)} placeholder="לדוגמה: משה כהן" className="w-full border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-800 dark:text-white rounded-xl px-3 py-2 focus:border-brand-primary outline-none text-sm" />
                                        </div>
                                    )}
                                    <div>
                                        <label className="block text-xs font-medium text-gray-700 dark:text-gray-300 mb-1">כתובת מייל</label>
                                        <input type="email" required value={authEmail} onChange={e => setAuthEmail(e.target.value)} placeholder="name@example.com" className="w-full border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-800 dark:text-white rounded-xl px-3 py-2 focus:border-brand-primary outline-none text-left text-sm" dir="ltr" />
                                    </div>
                                    {authMode !== 'forgot_password' && (
                                        <div>
                                            <label className="block text-xs font-medium text-gray-700 dark:text-gray-300 mb-1">סיסמה</label>
                                            <input type="password" required value={authPassword} onChange={e => setAuthPassword(e.target.value)} placeholder="לפחות 6 תווים" className="w-full border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-800 dark:text-white rounded-xl px-3 py-2 focus:border-brand-primary outline-none text-left text-sm" dir="ltr" />
                                        </div>
                                    )}
                                    
                                    {authError && <div className="text-red-600 bg-red-50 dark:bg-red-900/30 p-2 rounded-lg text-xs text-center font-bold border border-red-100 dark:border-red-900/50">{authError}</div>}

                                    <button type="submit" disabled={authLoading} className="w-full bg-brand-primary hover:bg-brand-dark text-white font-bold py-2.5 rounded-xl transition-colors shadow-sm mt-2 disabled:opacity-80 flex justify-center items-center gap-2 text-sm">
                                        {authLoading ? <Icon name="RefreshCw" className="animate-spin" size={16} /> : authMode === 'login' ? 'היכנס למערכת' : authMode === 'register' ? 'צור חשבון חדש' : 'שלח קישור לאיפוס'}
                                    </button>
                                </form>

                                {(authMode === 'login' || authMode === 'register') && (
                                    <div className="mt-4 pt-4 border-t border-gray-100 dark:border-gray-700">
                                        <button onClick={handleGoogleLogin} type="button" disabled={authLoading} className="w-full bg-white dark:bg-gray-700 border border-gray-300 dark:border-gray-600 text-gray-700 dark:text-white font-bold py-2.5 rounded-xl transition-colors shadow-sm flex justify-center items-center gap-2 text-sm hover:bg-gray-50 dark:hover:bg-gray-600">
                                            <svg className="w-4 h-4" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/><path d="M1 1h22v22H1z" fill="none"/></svg>
                                            המשך עם Google
                                        </button>
                                    </div>
                                )}

                                <div className="mt-4 pt-3 flex flex-col gap-2 text-xs">
                                    {authMode === 'login' ? (
                                        <React.Fragment>
                                            <button onClick={() => { setAuthMode('register'); setAuthError(''); }} className="text-brand-secondary hover:text-[#c15c3c] font-bold transition-colors">אין לך חשבון? הרשמה למערכת</button>
                                            <button onClick={() => { setAuthMode('forgot_password'); setAuthError(''); }} className="text-gray-500 hover:text-gray-800 dark:hover:text-white transition-colors">שכחת סיסמה?</button>
                                        </React.Fragment>
                                    ) : (
                                        <button onClick={() => { setAuthMode('login'); setAuthError(''); }} className="text-brand-secondary hover:text-[#c15c3c] font-bold transition-colors">חזור למסך ההתחברות</button>
                                    )}
                                </div>
                            </div>
                        </div>
                    )}

                    {showPaymentModal && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center bg-black/80 p-4 overflow-y-auto animate-fade-in">
                            <div className="relative w-full max-w-md my-8">
                                <button onClick={()=>setShowPaymentModal(false)} className="absolute -top-12 right-0 text-white bg-white/20 hover:bg-white/40 transition-colors p-2 rounded-full"><Icon name="X" size={24}/></button>
                                <PayPalSubscription onSuccess={handlePaymentSuccess} />
                            </div>
                        </div>
                    )}

                    {showA11y && (
                        <div className="fixed top-20 left-4 z-[100] bg-white dark:bg-gray-800 p-4 rounded-2xl shadow-2xl border-2 border-brand-secondary w-56 animate-fade-in text-right">
                             <div className="flex justify-between items-center mb-3 border-b border-gray-100 dark:border-gray-700 pb-2">
                                <button onClick={()=>setShowA11y(false)} className="text-gray-400 hover:text-red-500 transition-colors"><Icon name="X" size={18}/></button>
                                <h3 className="font-bold text-brand-primary dark:text-white flex items-center gap-2 text-sm">נגישות <Icon name="Accessibility" size={16} className="text-brand-secondary" /></h3>
                             </div>
                             <div className="space-y-1.5">
                                <button onClick={() => {document.body.style.fontSize = '1.1rem'}} className="w-full p-2 bg-gray-50 dark:bg-gray-700 hover:bg-gray-100 dark:hover:bg-gray-600 rounded-lg text-xs font-bold flex justify-between items-center transition-colors">הגדל טקסט <Icon name="ZoomIn" size={14}/></button>
                                <button onClick={() => {document.body.style.fontSize = '1rem'}} className="w-full p-2 bg-gray-50 dark:bg-gray-700 hover:bg-gray-100 dark:hover:bg-gray-600 rounded-lg text-xs font-bold flex justify-between items-center transition-colors">איפוס גודל <Icon name="RefreshCw" size={14}/></button>
                                <button onClick={() => document.body.classList.toggle('a11y-highlight-links')} className="w-full p-2 bg-gray-50 dark:bg-gray-700 hover:bg-gray-100 dark:hover:bg-gray-600 rounded-lg text-xs font-bold flex justify-between items-center transition-colors">הדגשת קישורים <Icon name="Underline" size={14}/></button>
                                <button onClick={() => document.body.classList.toggle('a11y-readable-font')} className="w-full p-2 bg-gray-50 dark:bg-gray-700 hover:bg-gray-100 dark:hover:bg-gray-600 rounded-lg text-xs font-bold flex justify-between items-center transition-colors">גופן קריא <Icon name="Type" size={14}/></button>
                             </div>
                        </div>
                    )}

                    <main className="flex-1 pb-16 pt-4 relative z-10">
                        {currentPage==='admin' && user?.isAdmin ? <AdminPage forumTopics={forumTopics} setMessage={m=>setAlertMsg({t:"הודעת מערכת", m})} /> : 
                         currentPage==='profile' && user ? <ProfilePage user={user} setAlertMsg={setAlertMsg} /> :
                         currentPage==='courses' ? <CoursesPage courses={courses} user={user} onPlay={setGlobalFile} setShowPayment={setShowPaymentModal} setShowAuthModal={setShowAuthModal} /> : 
                         currentPage==='forum' ? <ForumPage topics={forumTopics} user={user} setShowAuthModal={setShowAuthModal} /> : 
                         currentPage==='youtube' ? <YoutubePage onFileInteract={setGlobalFile} /> : 
                         <HomePage navigate={navigate} />}
                    </main>

                    <button 
                        onClick={() => window.scrollTo({top: 0, behavior: 'smooth'})} 
                        className={`fixed bottom-20 sm:bottom-6 right-6 sm:left-6 sm:right-auto bg-brand-primary hover:bg-brand-dark text-white p-2.5 rounded-full shadow-xl transition-all duration-300 z-40 hover:scale-110 ${showBackToTop ? 'opacity-100 translate-y-0' : 'opacity-0 translate-y-10 pointer-events-none'}`}
                    >
                        <Icon name="ArrowUp" size={20} />
                    </button>

                    <a href={WHATSAPP_LINK} target="_blank" rel="noopener noreferrer" className="whatsapp-float"><Icon name="MessageCircle" size={28}/></a>
                    
                    <footer className="bg-brand-dark dark:bg-gray-900 text-white py-8 border-t-4 border-brand-secondary text-center relative z-10 mt-auto">
                        <div className="max-w-7xl mx-auto px-4">
                            <h2 className="text-xl font-black mb-1">קהילת פסגה</h2>
                            <p className="text-gray-400 mb-4 text-sm font-medium">הבית העסקי למאמנים ומטפלים בהובלת משה וולנר</p>
                            <p className="text-xs text-gray-500 mb-2">© {new Date().getFullYear()} כל הזכויות שמורות.</p>
                            <p className="text-[10px] text-brand-light/50 bg-black/30 inline-block px-3 py-1 rounded-full">
                                נבנה על ידי <a href="https://lev-good.github.io/Good-heart/" target="_blank" rel="noopener noreferrer" className="text-brand-secondary hover:text-white font-bold transition-colors">לב טוב</a>
                            </p>
                        </div>
                    </footer>
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
