        const ForumPage = ({ user, setShowAuthModal, topics }) => {
            const [currentTopic, setCurrentTopic] = React.useState(null);

            const [newTitle, setNewTitle] = React.useState("");
            const [newContent, setNewContent] = React.useState("");
            const [isAnon, setIsAnon] = React.useState(false);
            const [newReply, setNewReply] = React.useState("");
            const [loading, setLoading] = React.useState(false);

            const handleCreate = async (e) => {
                e.preventDefault();
                if(!user) return setShowAuthModal(true);
                setLoading(true);
                try {
                    await window.FB.addDoc(window.FB.collection(window.FB.db, 'pisga_forum'), {
                        title: newTitle, content: newContent, author: isAnon ? 'אנונימי' : user.name, realAuthor: user.name,
                        date: new Date().toISOString(), isAnonymous: isAnon, replies: [], isAdminPost: user.isAdmin
                    });
                    setNewTitle(""); setNewContent(""); setIsFormOpen(false);
                } catch(e) { alert("שגיאה בענן"); }
                setLoading(false);
            };

            const handleReply = async (e) => {
                e.preventDefault();
                if(!user) return setShowAuthModal(true);
                setLoading(true);
                const updatedReplies = [...(currentTopic.replies || []), {
                    id: Date.now().toString(), content: newReply, author: isAnon ? 'אנונימי' : user.name, realAuthor: user.name,
                    date: new Date().toISOString(), isAnonymous: isAnon
                }];
                try {
                    await window.FB.updateDoc(window.FB.doc(window.FB.db, 'pisga_forum', currentTopic.id), { replies: updatedReplies });
                    setNewReply("");
                } catch(e) { alert("שגיאה בענן"); }
                setLoading(false);
            };

            if (currentTopic) {
                const t = topics.find(topic => topic.id === currentTopic.id) || currentTopic;
                return (
                    <div className="max-w-4xl mx-auto p-4 animate-fade-in pb-12">
                        <button onClick={() => setCurrentTopic(null)} className="mb-6 flex items-center gap-2 font-bold text-gray-500 hover:text-brand-primary transition bg-white dark:bg-gray-800 px-4 py-2 rounded-full shadow-sm border border-gray-200 dark:border-gray-700 w-max"><Icon name="ChevronRight" /> חזרה</button>

                        </div>
                        <div className="space-y-4 mb-10">
                            {t.replies?.map(r => (

                                    <div className="mt-3 text-xs text-gray-400 flex items-center gap-1"><Icon name="MessageCircle" size={12} /> {r.author} • {formatDate(r.date)}</div>
                                </div>

                            </div>
                        </form>
                    </div>

                             <h3 className="font-black text-2xl text-brand-primary dark:text-white mb-6">נושא חדש</h3>
                             <form onSubmit={handleCreate} className="space-y-4">
                                <input type="text" value={newTitle} onChange={e=>setNewTitle(e.target.value)} required placeholder="כותרת הנושא (לדוגמה: איך לשווק קליניקה בווטסאפ?)" className="w-full p-4 rounded-xl border border-gray-200 dark:border-gray-600 bg-gray-50 dark:bg-gray-900 font-bold outline-none text-gray-800 dark:text-white focus:border-brand-primary" />
                                <textarea value={newContent} onChange={e=>setNewContent(e.target.value)} required placeholder="פרטו כאן את השאלה או הדילמה שלכם בפירוט..." className="w-full p-4 rounded-xl border border-gray-200 dark:border-gray-600 bg-gray-50 dark:bg-gray-900 h-32 outline-none text-gray-800 dark:text-white focus:border-brand-primary resize-none"></textarea>
                                <div className="flex flex-col sm:flex-row justify-between items-center gap-4 pt-2">
                                    <label className="text-sm text-gray-600 dark:text-gray-300 flex items-center gap-2 cursor-pointer"><input type="checkbox" checked={isAnon} onChange={e=>setIsAnon(e.target.checked)} className="rounded" /> פרסם בעילום שם</label>
                                    <button type="submit" disabled={loading} className="bg-brand-secondary hover:bg-[#c15c3c] text-white w-full sm:w-auto px-10 py-3 rounded-xl font-bold transition-colors">פרסם בקהילה</button>
                                </div>
                            </form>
                        </div>
                    )}

                    <div className="space-y-4 mt-8">
                        {topics.map(t => (
                            <div key={t.id} onClick={() => setCurrentTopic(t)} className="bg-white dark:bg-gray-800 p-6 rounded-2xl shadow-sm border border-gray-100 dark:border-gray-700 cursor-pointer hover:border-brand-primary transition-colors flex justify-between items-center group">
                                <div>
                                    <h4 className="text-xl font-bold flex items-center gap-2 text-gray-800 dark:text-white group-hover:text-brand-primary dark:group-hover:text-brand-secondary transition-colors">
                                        {t.isAdminPost && <Icon name="ShieldCheck" className="text-brand-secondary" />} {t.title}
                                    </h4>
                                    <div className="text-sm text-gray-500 mt-2 flex items-center gap-2">
                                        <Icon name={t.isAnonymous ? "Ghost" : "User"} size={14} /> {t.author} <span className="opacity-50">•</span> <Icon name="MessageCircle" size={14} /> {t.replies?.length || 0} תגובות
                                    </div>
                                </div>
                                <div className="w-10 h-10 rounded-full bg-gray-50 dark:bg-gray-700 flex items-center justify-center text-gray-400 group-hover:bg-brand-primary/10 group-hover:text-brand-primary transition-colors shrink-0">
                                    <Icon name="ChevronLeft" />
                                </div>
                            </div>
                        ))}
                        {topics.length === 0 && <p className="text-center text-gray-500 py-10 font-bold">אין נושאים כרגע. היו הראשונים לפתוח דיון!</p>}
                    </div>
                </div>
            );
        };

        const YoutubePage = ({ onFileInteract }) => {
            const [videos, setVideos] = React.useState([]);
            const [loading, setLoading] = React.useState(true);
            React.useEffect(() => {
                const fetchYT = async () => {
                    try {
                        const rss = `https://www.youtube.com/feeds/videos.xml?channel_id=UC_x5XG1OV2P6uZZ5FSM9Ttw`; 
                        const api = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(rss)}`;
                        const res = await fetch(api);
                        const data = await res.json();
                        if (data.status === 'ok') setVideos(data.items.map((i, idx) => ({ id: `yt_${idx}`, name: i.title, url: i.link, thumbnail: i.thumbnail, type: 'youtube' })));
                    } catch (e) {}
                    setLoading(false);
                };
                fetchYT();
            }, []);
            return (
                <div className="max-w-6xl mx-auto p-4 space-y-8 animate-fade-in pb-12">
                    <div className="text-center p-10 md:p-14 bg-gradient-to-br from-red-50 to-red-100 dark:from-red-900/20 dark:to-gray-800 rounded-[3rem] border border-red-200 dark:border-red-900/30 relative overflow-hidden">
                        <Icon name="Youtube" size={120} className="absolute -left-10 top-1/2 -translate-y-1/2 text-red-500/10 dark:text-red-500/5" />
                        <Icon name="Youtube" size={56} className="text-red-600 mx-auto mb-4 relative z-10" />
                        <h2 className="text-4xl font-black text-gray-900 dark:text-white mb-4 relative z-10">ספריית התוכן הפתוח</h2>
                        <p className="text-xl text-gray-700 dark:text-gray-300 relative z-10">מבחר הדרכות, וובינרים וכלים ישירות מיוטיוב – פתוחים לכולם בחינם.</p>
                    </div>
                    {loading ? <div className="flex justify-center py-20"><Icon name="RefreshCw" size={40} className="animate-spin text-red-500" /></div> : 
                        <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-8">
                            {videos.map(v => (
                                <div key={v.id} onClick={() => onFileInteract(v)} className="bg-white dark:bg-gray-800 rounded-[2rem] overflow-hidden shadow-sm border border-gray-100 dark:border-gray-700 hover:shadow-xl hover:-translate-y-1 transition-all cursor-pointer group flex flex-col">
                                    <div className="relative aspect-video bg-gray-200 dark:bg-gray-700 overflow-hidden">

                                        <div className="absolute inset-0 bg-black/40 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity duration-300">
                                            <Icon name="PlayCircle" size={60} className="text-white drop-shadow-md" />

                                </div>
                            ))}
                        </div>
                    }
                </div>
            );
        };

        const AdminPage = ({ forumTopics, setMessage }) => {
            const [userEmailToUpgrade, setUserEmailToUpgrade] = React.useState("");

            const handleDeleteTopic = async (topic) => {
                if(!confirm("מחיקת נושא זה תסיר אותו לצמיתות מהענן. להמשיך?")) return;
                try {
                    await window.FB.deleteDoc(window.FB.doc(window.FB.db, 'pisga_forum', topic.id));
                    setMessage("הנושא נמחק בהצלחה.");
                } catch (e) { alert("שגיאה: " + e.message); }
            };

            const handleDeleteReply = async (topic, reply) => {
                if(!confirm("האם למחוק תגובה זו?")) return;
                try {
                    const updatedReplies = topic.replies.filter(r => r.id !== reply.id);
                    await window.FB.updateDoc(window.FB.doc(window.FB.db, 'pisga_forum', topic.id), { replies: updatedReplies });
                    setMessage("התגובה נמחקה בהצלחה.");
                } catch (e) { alert("שגיאה במחיקת תגובה."); }
            };

            const handleManualUpgrade = async (e) => {
                e.preventDefault();
                if(!userEmailToUpgrade) return;
                try {
                    const userRef = window.FB.doc(window.FB.db, 'pro_users', userEmailToUpgrade.toLowerCase().trim());
                    await window.FB.setDoc(userRef, { isPro: true, addedAt: new Date().toISOString(), method: 'manual_admin' });
                    setMessage(`האימייל ${userEmailToUpgrade} הוגדר בהצלחה כמנוי Pro.`);
                    setUserEmailToUpgrade("");
                } catch(e) { alert("שגיאה בהוספת המשתמש לשרת."); }
            };

            return (
                <div className="max-w-6xl mx-auto p-4 space-y-8 pb-12 animate-fade-in">
                    {/* Manual User Management */}
                    <div className="bg-white dark:bg-gray-800 rounded-3xl p-8 border border-brand-primary/20 shadow-sm">
                        <div className="flex items-center gap-4 mb-6 border-b border-gray-100 dark:border-gray-700 pb-4">
                            <div className="w-14 h-14 bg-brand-primary/10 rounded-full flex items-center justify-center text-brand-primary"><Icon name="UserPlus" size={28} /></div>
                            <div>
                                <h2 className="text-2xl font-black text-gray-800 dark:text-white">ניהול משתמשי Pro</h2>
                                <p className="text-gray-500 text-sm mt-1">פתיחת גישה ידנית לקורסים עבור תלמידים ששילמו בדרכים אחרות.</p>
                            </div>
                        </div>
                        <form onSubmit={handleManualUpgrade} className="flex flex-col sm:flex-row gap-4">
                            <input type="email" value={userEmailToUpgrade} onChange={e=>setUserEmailToUpgrade(e.target.value)} required placeholder="הזן את כתובת המייל של התלמיד..." className="flex-1 p-4 rounded-xl border border-gray-200 dark:border-gray-600 bg-gray-50 dark:bg-gray-900 text-gray-800 dark:text-white outline-none focus:border-brand-primary text-left" dir="ltr" />
                            <button type="submit" className="bg-brand-primary hover:bg-brand-dark text-white px-8 py-4 rounded-xl font-bold transition-colors shadow-md">הוסף הרשאת מנוי</button>
                        </form>
                    </div>

                    {/* Forum Management */}
                    <div className="bg-white dark:bg-gray-800 rounded-3xl p-8 border border-brand-primary/20 shadow-sm">
                        <div className="flex items-center gap-4 mb-8 border-b border-gray-100 dark:border-gray-700 pb-4">
                            <div className="w-14 h-14 bg-brand-secondary/10 rounded-full flex items-center justify-center text-brand-secondary"><Icon name="Settings" size={28} /></div>
                            <div>
                                <h2 className="text-2xl font-black text-gray-800 dark:text-white">ניהול הקהילה (פורום)</h2>
                                <p className="text-gray-500 text-sm mt-1">מחיקת נושאים שלמים או תגובות ספציפיות בתוך נושא.</p>
                            </div>
                        </div>
                        
                        <div className="space-y-6">
                            {forumTopics.map(topic => (
                                <div key={topic.id} className="border border-gray-200 dark:border-gray-700 p-6 rounded-2xl bg-gray-50 dark:bg-gray-800/50">
                                    <div className="flex justify-between items-start mb-4 pb-4 border-b border-gray-200 dark:border-gray-700">
                                        <div>
                                            <h3 className="font-bold text-xl text-brand-primary dark:text-white">{topic.title}</h3>
                                            <p className="text-sm text-gray-500 mt-1">מאת: {topic.realAuthor} | {topic.replies?.length || 0} תגובות</p>
                                        </div>
                                        <button onClick={() => handleDeleteTopic(topic)} className="bg-red-100 dark:bg-red-900/30 text-red-600 hover:bg-red-500 hover:text-white px-4 py-2 rounded-xl transition flex items-center gap-2 text-sm font-bold">
                                            <Icon name="Trash2" size={16} /> מחק אשכול
                                        </button>
                                    </div>
                                    
                                    {topic.replies && topic.replies.length > 0 && (
                                        <div className="bg-white dark:bg-gray-800 rounded-xl p-4 space-y-3 border border-gray-100 dark:border-gray-700">
                                            <h4 className="text-sm font-bold text-gray-400 mb-2">תגובות:</h4>
                                            {topic.replies.map(reply => (
                                                <div key={reply.id} className="flex justify-between items-center bg-gray-50 dark:bg-gray-900 p-3 rounded-lg border border-gray-100 dark:border-gray-800">
                                                    <div>
                                                        <p className="text-gray-800 dark:text-gray-200 text-sm">{reply.content}</p>
                                                        <span className="text-xs text-gray-500 mt-1 block">מאת: {reply.realAuthor}</span>
                                                    </div>
                                                    <button onClick={() => handleDeleteReply(topic, reply)} className="text-gray-400 hover:text-red-500 hover:bg-red-50 dark:hover:bg-gray-800 p-2 rounded-lg transition" title="מחק תגובה">
                                                        <Icon name="X" size={18} />
                                                    </button>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </div>
                            ))}
                            {forumTopics.length === 0 && <p className="text-center text-gray-500 font-bold">אין נושאים בפורום.</p>}
                        </div>
                    </div>
                </div>
            );
        };

        const GlobalFileViewer = ({ file, onClose }) => {
            if (!file) return null;
            const getUrl = (f) => {
                if (f.url.includes('youtube.com') || f.url.includes('youtu.be')) {
                    const id = f.url.match(/(?:youtu\.be\/|youtube\.com\/(?:embed\/|v\/|watch\?v=|watch\?.+&v=))([^&]{11})/);
                    return id ? `https://www.youtube.com/embed/${id[1]}?autoplay=1` : f.url;
                }
                return f.url.replace('/view', '/preview');
            };
            return (
                <div className="fixed inset-0 z-[9999] flex items-center justify-center bg-black/90 p-2 sm:p-8 animate-fade-in">
                    <div className="bg-black w-full max-w-6xl h-full md:h-[85vh] rounded-3xl overflow-hidden flex flex-col shadow-2xl border border-gray-800">
                        <div className="bg-gray-900 text-white p-5 flex justify-between items-center border-b border-gray-800">
                            <h3 className="font-bold text-lg truncate pr-4">{file.name}</h3>
                            <button onClick={onClose} className="p-2 bg-gray-800 hover:bg-gray-700 rounded-full transition-colors"><Icon name="X" /></button>
                        </div>
                        <iframe src={getUrl(file)} className="flex-1 w-full h-full border-none bg-black" allow="autoplay; fullscreen" allowFullScreen></iframe>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [showSplash, setShowSplash] = React.useState(true);
            const [user, setUser] = React.useState(() => JSON.parse(localStorage.getItem('pisga_user')) || null);
            const [courses, setCourses] = React.useState(INITIAL_COURSES);
            const [forumTopics, setForumTopics] = React.useState([]);
            const [currentPage, setCurrentPage] = React.useState('home');
            const [globalFile, setGlobalFile] = React.useState(null);
            const [alertMsg, setAlertMsg] = React.useState(null);
            
            const [isDarkMode, setIsDarkMode] = React.useState(() => localStorage.getItem('darkMode') === 'true');
            const [showA11y, setShowA11y] = React.useState(false);
            const [isMobileMenuOpen, setIsMobileMenuOpen] = React.useState(false);
            const [showBackToTop, setShowBackToTop] = React.useState(false);

            // REAL AUTH STATE
            const [showAuthModal, setShowAuthModal] = React.useState(false);
            const [showPaymentModal, setShowPaymentModal] = React.useState(false);
            const [authMode, setAuthMode] = React.useState('login');
            const [authEmail, setAuthEmail] = React.useState('');
            const [authPassword, setAuthPassword] = React.useState('');
            const [authName, setAuthName] = React.useState('');
            const [authPassAdmin, setAuthPassAdmin] = React.useState('');
            const [authError, setAuthError] = React.useState('');
            const [authLoading, setAuthLoading] = React.useState(false);

            React.useEffect(() => { setTimeout(() => setShowSplash(false), 2000); }, []);
            React.useEffect(() => { document.documentElement.classList.toggle('dark', isDarkMode); localStorage.setItem('darkMode', isDarkMode); }, [isDarkMode]);
            React.useEffect(() => { const h = () => setShowBackToTop(window.scrollY > 300); window.addEventListener('scroll', h); return () => window.removeEventListener('scroll', h); }, []);

            // Firebase Live Data & Drive Sync
            React.useEffect(() => {
                if (DRIVE_SCRIPT_URL && DRIVE_SCRIPT_URL.startsWith('http')) {
                    fetch(DRIVE_SCRIPT_URL)
                        .then(res => res.json())
                        .then(data => { if (data && Array.isArray(data) && data.length > 0) setCourses(data); })
                        .catch(e => console.log("Drive Sync Error:", e));
                }

                if (!window.FB) return;
                
                let unsubPro = () => {};

                const unsubscribeAuth = window.FB.onAuthStateChanged(window.FB.auth, async (fbUser) => {
                    if (fbUser && fbUser.email) {
                        const isAdmin = fbUser.email.toLowerCase() === 'zwolner@gmail.com';
                        const proRef = window.FB.doc(window.FB.db, 'pro_users', fbUser.email.toLowerCase());
                        
                        // Real-time listener for Pro status (Updates instantly if admin adds them!)
                        unsubPro = window.FB.onSnapshot(proRef, (proDoc) => {
                            const isPro = proDoc.exists() || isAdmin;
                            const u = { name: fbUser.displayName || 'משתמש', email: fbUser.email, isAdmin: isAdmin, isSubscribed: isPro, uid: fbUser.uid };
                            setUser(u);
                            localStorage.setItem('pisga_user', JSON.stringify(u));
                        });
                    } else {
                        unsubPro();
                        if (!fbUser) window.FB.signInAnonymously(window.FB.auth).catch(e => console.log(e));
                        else setUser(null); // Keep UI logged out for anonymous
                    }
                });

                const q = window.FB.query(window.FB.collection(window.FB.db, 'pisga_forum'));
                const unsubForum = window.FB.onSnapshot(q, s => {
                    const list = [];
                    s.forEach(d => list.push({ id: d.id, ...d.data() }));
                    setForumTopics(list.sort((a,b) => new Date(b.date) - new Date(a.date)));
                });
                
                return () => { unsubscribeAuth(); unsubPro(); unsubForum(); };
            }, []);

            // REAL FIREBASE AUTHENTICATION LOGIC
            const handleAuth = async (e) => {
                e.preventDefault(); setAuthError(''); setAuthLoading(true);
                if (!window.FB) { setAuthError("אין חיבור לשרת."); setAuthLoading(false); return; }

                let isAdmin = false;
                if (authName.includes("משה וולנר") || authName.includes("מנהל") || authEmail === "zwolner@gmail.com") {
                    if (authPassAdmin === ADMIN_PASSWORD) isAdmin = true;
                    else { setAuthError("סיסמת מנהל שגויה"); setAuthLoading(false); return; }
                }

                try {
                    if (authMode === 'register') {
                        const res = await window.FB.createUserWithEmailAndPassword(window.FB.auth, authEmail, authPassword);
                        await window.FB.updateProfile(res.user, { displayName: authName });
                        setAlertMsg({t: "ברוכים הבאים!", m: "החשבון נוצר בהצלחה."});
                    } else if (authMode === 'login') {
                        await window.FB.signInWithEmailAndPassword(window.FB.auth, authEmail, authPassword);
                    } else if (authMode === 'forgot_password') {
                        await window.FB.sendPasswordResetEmail(window.FB.auth, authEmail);
                        setAlertMsg({t: "נשלח מייל", m: "קישור לאיפוס סיסמה נשלח לכתובת המייל שלך."});
                        setAuthMode('login');
                    }
                    setShowAuthModal(false);
                } catch (error) {
                    if (error.code === 'auth/email-already-in-use') setAuthError("כתובת המייל כבר קיימת במערכת.");
                    else if (error.code === 'auth/wrong-password' || error.code === 'auth/user-not-found' || error.code === 'auth/invalid-credential') setAuthError("אימייל או סיסמה שגויים.");
                    else if (error.code === 'auth/weak-password') setAuthError("הסיסמה חלשה מדי (לפחות 6 תווים).");
                    else setAuthError("שגיאה בתהליך. אנא נסה שוב.");
                }
                setAuthLoading(false); setAuthPassAdmin('');
            };

            const handlePaymentSuccess = async (id) => {
                if(!user || !user.email) return;
                try {
                    const proRef = window.FB.doc(window.FB.db, 'pro_users', user.email.toLowerCase());
                    await window.FB.setDoc(proRef, { isPro: true, paypalId: id, updatedAt: new Date().toISOString() });
                    setShowPaymentModal(false);
                    setAlertMsg({t:"תודה על רכישתך!", m:"מנוי ה-Pro שלך הופעל בהצלחה. כל הקורסים פתוחים עבורך."});
                } catch(e) { alert("שגיאה בעדכון השרת."); }
            };

            const toggleA11yMenu = () => setShowA11y(!showA11y);
            const navigate = (id) => { window.location.hash = id; setCurrentPage(id); setIsMobileMenuOpen(false); };
            React.useEffect(() => { const h = window.location.hash.replace('#','') || 'home'; setCurrentPage(h); }, []);

            const navItems = [
                {id:'home', l:'ראשי', i:'Home'},
                {id:'youtube', l:'תכנים חינמיים', i:'Youtube'},
                {id:'courses', l:'קורסים בתשלום', i:'PlayCircle'}, 
                {id:'forum', l:'הקהילה שלנו', i:'MessageSquare'}
            ];

            return (
                <div className="min-h-screen flex flex-col bg-gray-50 dark:bg-[#0b1b24] font-sans relative">
                    {showSplash && <SplashScreen />}
                    {alertMsg && <CustomMessageBox title={alertMsg.t} message={alertMsg.m} onClose={()=>setAlertMsg(null)} />}
                    <GlobalFileViewer file={globalFile} onClose={()=>setGlobalFile(null)} />
                    
                    <header className="bg-white dark:bg-gray-900 shadow-sm sticky top-0 z-50 border-b-4 border-brand-secondary h-24 flex items-center">
                        <div className="max-w-7xl mx-auto px-4 w-full flex justify-between items-center">
                            <div onClick={()=>navigate('home')} className="flex items-center gap-3 cursor-pointer shrink-0">
                                <Icon name="Mountain" className="text-brand-primary" size={40} />
                                <h1 className="font-black text-2xl text-brand-primary dark:text-white hidden sm:block">פסגה</h1>
                            </div>
                            <nav className="hidden lg:flex gap-3 overflow-x-auto scrollbar-hide px-4 items-center justify-center flex-1">
                                {navItems.map(n => (
                                    <button key={n.id} onClick={()=>navigate(n.id)} className={`px-4 py-2.5 rounded-2xl font-bold text-[15px] flex items-center gap-2 transition-all duration-300 ${currentPage===n.id ? 'bg-brand-primary/10 text-brand-primary dark:bg-brand-secondary/20 dark:text-brand-secondary transform scale-105' : 'text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-800 hover:text-brand-primary'}`}>
                                        <Icon name={n.i} size={18}/> {n.l}
                                    </button>
                                ))}
                                {user?.isAdmin && <button onClick={()=>navigate('admin')} className="px-4 py-2.5 rounded-2xl font-bold text-[15px] bg-gray-800 hover:bg-gray-700 text-white flex items-center gap-2 transition-colors"><Icon name="Settings" size={18}/> ניהול</button>}
                            </nav>
                            <div className="flex items-center gap-2 sm:gap-4 shrink-0">
                                {!user ? <button onClick={()=>{setAuthMode('login'); setShowAuthModal(true); setAuthError('');}} className="text-[15px] font-bold text-brand-primary border-2 border-brand-primary/30 px-5 py-2 rounded-2xl hover:bg-brand-primary hover:text-white transition-colors shadow-sm">התחברות</button> : 
                                <div className="flex items-center gap-2 bg-gray-100 dark:bg-gray-800 p-1.5 px-4 rounded-2xl border border-gray-200 dark:border-gray-700 shadow-sm">
                                    <span className="text-sm font-bold text-gray-800 dark:text-gray-200 truncate max-w-[100px]">{user.name}</span>
                                    <button onClick={()=>{localStorage.removeItem('pisga_user'); window.FB.auth.signOut(); setUser(null); navigate('home');}} className="text-gray-400 hover:text-red-500 transition-colors"><Icon name="LogOut" size={18}/></button>
                                </div>}
                                <div className="flex items-center gap-1 hidden sm:flex">
                                    <button onClick={() => setIsDarkMode(!isDarkMode)} className="p-2.5 text-gray-500 hover:text-brand-primary dark:hover:text-white rounded-full bg-gray-50 dark:bg-gray-800 transition-colors"><Icon name={isDarkMode ? "Sun" : "Moon"} size={20} /></button>
                                    <button onClick={toggleA11yMenu} className="p-2.5 text-gray-500 hover:text-brand-primary dark:hover:text-white rounded-full bg-gray-50 dark:bg-gray-800 transition-colors"><Icon name="Accessibility" size={20} /></button>
                                </div>
                                <button onClick={()=>setIsMobileMenuOpen(!isMobileMenuOpen)} className="lg:hidden p-2 text-brand-primary dark:text-white"><Icon name={isMobileMenuOpen ? "X" : "Menu"} size={28}/></button>
                            </div>
                        </div>
                    </header>

                    {isMobileMenuOpen && (
                        <div className="lg:hidden bg-white dark:bg-gray-900 border-b border-gray-100 dark:border-gray-800 shadow-xl p-4 space-y-2 absolute w-full z-40">
                            {navItems.map(item => (
                                <button key={item.id} onClick={() => navigate(item.id)} className="w-full text-right p-4 rounded-xl font-bold text-gray-700 dark:text-gray-200 hover:bg-gray-50 dark:hover:bg-gray-800 flex items-center gap-3"><Icon name={item.icon} size={20}/> {item.label}</button>
                            ))}
                            {user?.isAdmin && <button onClick={() => navigate('admin')} className="w-full text-right p-4 rounded-xl font-bold text-brand-primary flex items-center gap-3"><Icon name="Settings" size={20}/> ניהול</button>}
                        </div>
                    )}

                    {showAuthModal && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center bg-black/60 backdrop-blur-sm p-4 animate-fade-in">
                            <div className="bg-white dark:bg-gray-800 rounded-3xl p-8 max-w-sm w-full text-center relative shadow-2xl border border-gray-200 dark:border-gray-700">
                                <button onClick={() => setShowAuthModal(false)} className="absolute top-5 left-5 text-gray-400 hover:text-gray-800 dark:hover:text-white bg-gray-100 dark:bg-gray-700 p-2 rounded-full transition-colors"><Icon name="X" size={20} /></button>
                                <Icon name={authMode === 'forgot_password' ? 'Mail' : 'User'} size={36} className="mx-auto mb-4 text-brand-primary dark:text-brand-secondary" />
                                <h3 className="text-2xl font-black mb-2 text-gray-800 dark:text-white">{authMode === 'login' ? 'התחברות לחשבון' : authMode === 'register' ? 'הרשמה למערכת' : 'איפוס סיסמה'}</h3>
                                
                                <form onSubmit={handleAuth} className="space-y-4 text-right animate-fade-in mt-6">
                                    {authMode === 'register' && (
                                        <div>
                                            <label className="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">שם מלא</label>
                                            <input type="text" required value={authName} onChange={e => setAuthName(e.target.value)} placeholder="לדוגמה: משה כהן" className="w-full border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-800 dark:text-white rounded-xl px-4 py-3 focus:border-brand-primary outline-none" />
                                        </div>
                                    )}
                                    <div>
                                        <label className="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">כתובת מייל</label>
                                        <input type="email" required value={authEmail} onChange={e => setAuthEmail(e.target.value)} placeholder="name@example.com" className="w-full border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-800 dark:text-white rounded-xl px-4 py-3 focus:border-brand-primary outline-none text-left" dir="ltr" />
                                    </div>
                                    {authMode !== 'forgot_password' && (
                                        <div>
                                            <label className="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">סיסמה</label>
                                            <input type="password" required value={authPassword} onChange={e => setAuthPassword(e.target.value)} placeholder="לפחות 6 תווים" className="w-full border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-800 dark:text-white rounded-xl px-4 py-3 focus:border-brand-primary outline-none text-left" dir="ltr" />
                                        </div>
                                    )}

                                    {authMode === 'login' && (authEmail === 'zwolner@gmail.com' || authEmail.includes('admin')) && (
                                        <div className="animate-fade-in pt-2">
                                            <input type="password" value={authPassAdmin} onChange={e=>setAuthPassAdmin(e.target.value)} placeholder="קוד מנהל סודי (לא חובה)" className="w-full border border-brand-secondary/50 bg-brand-secondary/10 dark:bg-brand-secondary/20 text-gray-800 dark:text-white rounded-xl px-4 py-3 outline-none" />
                                        </div>
                                    )}
                                    
                                    {authError && <div className="text-red-600 bg-red-50 dark:bg-red-900/30 p-3 rounded-xl text-sm text-center font-bold border border-red-100 dark:border-red-900/50">{authError}</div>}

                                    <button type="submit" disabled={authLoading} className="w-full bg-brand-primary hover:bg-brand-dark text-white font-bold py-3.5 rounded-xl transition-colors shadow-md mt-4 disabled:opacity-80 flex justify-center items-center gap-2">
                                        {authLoading ? <Icon name="RefreshCw" className="animate-spin" size={20} /> : authMode === 'login' ? 'היכנס למערכת' : authMode === 'register' ? 'צור חשבון חדש' : 'שלח קישור לאיפוס'}
                                    </button>
                                </form>

                                <div className="mt-6 pt-5 border-t border-gray-100 dark:border-gray-700 flex flex-col gap-3 text-sm">
                                    {authMode === 'login' ? (
                                        <React.Fragment>
                                            <button onClick={() => { setAuthMode('register'); setAuthError(''); }} className="text-brand-secondary hover:text-[#c15c3c] font-bold transition-colors">אין לך חשבון? הרשמה למערכת</button>
                                            <button onClick={() => { setAuthMode('forgot_password'); setAuthError(''); }} className="text-gray-500 hover:text-gray-800 dark:hover:text-white transition-colors">שכחת סיסמה?</button>
                                        </React.Fragment>
                                    ) : (
                                        <button onClick={() => { setAuthMode('login'); setAuthError(''); }} className="text-brand-secondary hover:text-[#c15c3c] font-bold transition-colors">חזור למסך ההתחברות</button>
                                    )}
                                </div>
                            </div>
                        </div>
                    )}

                    {showPaymentModal && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center bg-black/80 p-4 overflow-y-auto animate-fade-in">
                            <div className="relative w-full max-w-md my-8">
                                <button onClick={()=>setShowPaymentModal(false)} className="absolute -top-12 right-0 text-white bg-white/20 hover:bg-white/40 transition-colors p-2 rounded-full"><Icon name="X" size={24}/></button>
                                <PayPalSubscription onSuccess={handlePaymentSuccess} />
                            </div>
                        </div>
                    )}

                    {showA11y && (
                        <div className="fixed top-28 left-4 z-[100] bg-white dark:bg-gray-800 p-5 rounded-2xl shadow-2xl border-2 border-brand-secondary w-64 animate-fade-in text-right">
                             <div className="flex justify-between items-center mb-4 border-b border-gray-100 dark:border-gray-700 pb-3">
                                <button onClick={()=>setShowA11y(false)} className="text-gray-400 hover:text-red-500 transition-colors"><Icon name="X" size={20}/></button>
                                <h3 className="font-bold text-brand-primary dark:text-white flex items-center gap-2">נגישות <Icon name="Accessibility" size={18} className="text-brand-secondary" /></h3>
                             </div>
                             <div className="space-y-2">
                                <button onClick={() => {document.body.style.fontSize = '1.2rem'}} className="w-full p-2.5 bg-gray-50 dark:bg-gray-700 hover:bg-gray-100 dark:hover:bg-gray-600 rounded-xl text-sm font-bold flex justify-between items-center transition-colors">הגדל טקסט <Icon name="ZoomIn" size={16}/></button>
                                <button onClick={() => {document.body.style.fontSize = '1rem'}} className="w-full p-2.5 bg-gray-50 dark:bg-gray-700 hover:bg-gray-100 dark:hover:bg-gray-600 rounded-xl text-sm font-bold flex justify-between items-center transition-colors">איפוס גודל <Icon name="RefreshCw" size={16}/></button>
                                <button onClick={() => document.body.classList.toggle('a11y-highlight-links')} className="w-full p-2.5 bg-gray-50 dark:bg-gray-700 hover:bg-gray-100 dark:hover:bg-gray-600 rounded-xl text-sm font-bold flex justify-between items-center transition-colors">הדגשת קישורים <Icon name="Underline" size={16}/></button>
                                <button onClick={() => document.body.classList.toggle('a11y-readable-font')} className="w-full p-2.5 bg-gray-50 dark:bg-gray-700 hover:bg-gray-100 dark:hover:bg-gray-600 rounded-xl text-sm font-bold flex justify-between items-center transition-colors">גופן קריא <Icon name="Type" size={16}/></button>
                             </div>
                        </div>
                    )}

                    <main className="flex-1 pb-20 pt-4 relative z-10">
                        {currentPage==='admin' && user?.isAdmin ? <AdminPage forumTopics={forumTopics} setMessage={m=>setAlertMsg({t:"הודעת מערכת", m})} /> : 
                         currentPage==='courses' ? <CoursesPage courses={courses} user={user} onPlay={setGlobalFile} setShowPayment={setShowPaymentModal} setShowAuthModal={setShowAuthModal} /> : 
                         currentPage==='forum' ? <ForumPage topics={forumTopics} user={user} setShowAuthModal={setShowAuthModal} /> : 
                         currentPage==='youtube' ? <YoutubePage onFileInteract={setGlobalFile} /> : 
                         <HomePage navigate={navigate} />}
                    </main>

                    <button 
                        onClick={() => window.scrollTo({top: 0, behavior: 'smooth'})} 
                        className={`fixed bottom-24 sm:bottom-8 right-6 sm:left-6 sm:right-auto bg-brand-primary hover:bg-brand-dark text-white p-3 rounded-full shadow-xl transition-all duration-300 z-40 hover:scale-110 ${showBackToTop ? 'opacity-100 translate-y-0' : 'opacity-0 translate-y-10 pointer-events-none'}`}
                    >
                        <Icon name="ArrowUp" size={24} />
                    </button>

                    <a href={WHATSAPP_LINK} target="_blank" rel="noopener noreferrer" className="whatsapp-float"><Icon name="MessageCircle" size={32}/></a>
                    
                    <footer className="bg-brand-dark dark:bg-gray-900 text-white py-10 border-t-4 border-brand-secondary text-center relative z-10 mt-auto">
                        <div className="max-w-7xl mx-auto px-4">
                            <h2 className="text-2xl font-black mb-2">קהילת פסגה</h2>
                            <p className="text-gray-400 mb-6 font-medium">הבית העסקי למאמנים ומטפלים בהובלת משה וולנר</p>
                            <p className="text-sm text-gray-500 mb-2">© {new Date().getFullYear()} כל הזכויות שמורות.</p>
                            <p className="text-sm text-brand-light/50 bg-black/30 inline-block px-4 py-1.5 rounded-full">
                                נבנה על ידי <a href="https://lev-good.github.io/Good-heart/" target="_blank" rel="noopener noreferrer" className="text-brand-secondary hover:text-white font-bold transition-colors">לב טוב</a>
                            </p>
                        </div>
                    </footer>
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
