            // Firebase Live Data & Drive Sync

                        .catch(e => console.log("Drive Sync Error:", e));

                if (!window.FB) return;
                
                // 2. Keep anonymous connection active if no user logged in
                const unsubscribeAuth = window.FB.onAuthStateChanged(window.FB.auth, (fbUser) => {
                    if (!fbUser) window.FB.signInAnonymously(window.FB.auth).catch(e => console.log(e));
                });

                const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';
                const q = window.FB.query(window.FB.collection(window.FB.db, 'artifacts', appId, 'public', 'data', 'forum_topics'));
                const unsubForum = window.FB.onSnapshot(q, (snapshot) => {
                    const list = [];

                    setForumTopics(list.sort((a,b) => new Date(b.date) - new Date(a.date)));
                }, (error) => console.log(error));
                
                return () => { unsubscribeAuth(); unsubForum(); };

            const handleAuth = async (e) => {
                e.preventDefault();
                setAuthError('');

                }

                try {
                    if (authMode === 'register') {
                        const userCredential = await window.FB.createUserWithEmailAndPassword(window.FB.auth, authEmail, authPassword);
                        await window.FB.updateProfile(userCredential.user, { displayName: authName });
                        
                        const isAdmin = (authEmail.toLowerCase() === 'zwolner@gmail.com');
                        const newUser = { name: authName, email: authEmail, isSubscribed: isAdmin, isAdmin: isAdmin, uid: userCredential.user.uid };
                        localStorage.setItem('pisga_user', JSON.stringify(newUser));
                        setUser(newUser);
                        setShowAuthModal(false);
                        setAlertMsg({t: "ברוכים הבאים!", m: "החשבון נוצר בהצלחה."});

                    } else if (authMode === 'login') {
                        const userCredential = await window.FB.signInWithEmailAndPassword(window.FB.auth, authEmail, authPassword);
                        const displayName = userCredential.user.displayName || 'משתמש';
                        
                        const isAdmin = (authEmail.toLowerCase() === 'zwolner@gmail.com');
                        const loggedUser = { name: displayName, email: authEmail, isSubscribed: isAdmin, isAdmin: isAdmin, uid: userCredential.user.uid };
                        localStorage.setItem('pisga_user', JSON.stringify(loggedUser));
                        setUser(loggedUser);
                        setShowAuthModal(false);
                        setAlertMsg({t: "התחברת בהצלחה", m: `ברוך שובך, ${displayName}!`});

                    } else if (authMode === 'forgot_password') {
                        await window.FB.sendPasswordResetEmail(window.FB.auth, authEmail);
                        setAlertMsg({t: "נשלח מייל", m: "קישור לאיפוס סיסמה נשלח לכתובת המייל שלך."});
                        setAuthMode('login');
                    }
                } catch (error) {
                    console.error("Auth Error:", error);
                    if (error.code === 'auth/email-already-in-use') setAuthError("כתובת המייל כבר קיימת במערכת.");
                    else if (error.code === 'auth/wrong-password' || error.code === 'auth/user-not-found' || error.code === 'auth/invalid-credential') setAuthError("אימייל או סיסמה שגויים.");
                    else if (error.code === 'auth/weak-password') setAuthError("הסיסמה חלשה מדי (לפחות 6 תווים).");
                    else setAuthError("שגיאה בתהליך. אנא נסה שוב.");
                }
                
                setAuthLoading(false);
            };

            const navigate = (id) => { window.location.hash = id; setCurrentPage(id); setIsMobileMenuOpen(false); };
            React.useEffect(() => { 
                const h = window.location.hash.replace('#','') || 'home';
                setCurrentPage(h);
            }, []);

            // A11y Functions
            const toggleA11yMenu = () => setShowA11y(!showA11y);
            const changeFontSize = (step) => document.body.style.fontSize = `${parseFloat(getComputedStyle(document.body).fontSize || 16) + step}px`;
            const toggleReadableFont = () => document.body.classList.toggle('a11y-readable-font');
            const toggleHighlightLinks = () => document.body.classList.toggle('a11y-highlight-links');
            const resetA11y = () => { document.body.style.fontSize = ''; document.body.classList.remove('a11y-readable-font', 'a11y-highlight-links'); setShowA11y(false); };

            const navItems = [
                {id:'home', l:'ראשי', i:'Home'},
                {id:'courses', l:'קורסים בתשלום', i:'PlayCircle'}, 
                {id:'forum', l:'הקהילה שלנו', i:'MessageSquare'},
                {id:'youtube', l:'תכנים חינמיים', i:'Youtube'},
                {id:'about', l:'אודות', i:'Info'}
            ];

            return (
                <div className="min-h-screen flex flex-col bg-gray-50 dark:bg-[#0b1b24] font-sans relative">
                    {showSplash && <SplashScreen />}
                    {alertMsg && <CustomMessageBox title={alertMsg.t} message={alertMsg.m} onClose={()=>setAlertMsg(null)} />}
                    <GlobalFileViewer file={globalFile} onClose={()=>setGlobalFile(null)} />
                    
                    <header className="bg-white dark:bg-gray-900 shadow-sm sticky top-0 z-50 border-b-4 border-brand-secondary">
                        <div className="max-w-7xl mx-auto px-4 h-24 flex justify-between items-center">
                            <div onClick={()=>navigate('home')} className="flex items-center gap-3 cursor-pointer shrink-0">
                                <Icon name="Mountain" className="text-brand-primary" size={40} />
                                <h1 className="font-black text-2xl text-brand-primary dark:text-white hidden sm:block">פסגה</h1>
                            </div>
                            
                            {/* Updated and Spaced Navigation Bar */}
                            <nav className="hidden lg:flex gap-3 overflow-x-auto scrollbar-hide px-4 items-center justify-center flex-1">
                                {navItems.map(n => (
                                    <button key={n.id} onClick={()=>navigate(n.id)} className={`px-4 py-2.5 rounded-2xl font-bold text-[15px] flex items-center gap-2 transition-all duration-300 ${currentPage===n.id ? 'bg-brand-primary/10 text-brand-primary dark:bg-brand-secondary/20 dark:text-brand-secondary transform scale-105' : 'text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-800 hover:text-brand-primary'}`}>
                                        <Icon name={n.i} size={18}/> {n.l}
                                    </button>
                                ))}
                                {user?.isAdmin && <button onClick={()=>navigate('admin')} className="px-4 py-2.5 rounded-2xl font-bold text-[15px] bg-gray-800 text-white flex items-center gap-2 hover:bg-gray-700 transition-colors"><Icon name="Settings" size={18}/> ניהול</button>}
                            </nav>
                            
                            <div className="flex items-center gap-2 sm:gap-4 shrink-0">
                                {!user ? <button onClick={()=>{setAuthMode('login'); setShowAuthModal(true); setAuthError('');}} className="text-[15px] font-bold text-brand-primary border-2 border-brand-primary/30 px-5 py-2 rounded-2xl hover:bg-brand-primary hover:text-white transition-colors shadow-sm">התחברות</button> : 
                                <div className="flex items-center gap-2 bg-gray-100 dark:bg-gray-800 p-1.5 px-4 rounded-2xl border border-gray-200 dark:border-gray-700 shadow-sm">
                                    <span className="text-sm font-bold text-gray-800 dark:text-gray-200 truncate max-w-[100px]">{user.name}</span>
                                    <button onClick={()=>{localStorage.removeItem('pisga_user');setUser(null);navigate('home')}} className="text-gray-400 hover:text-red-500 transition-colors"><Icon name="LogOut" size={18}/></button>
                                </div>}
                                <div className="flex items-center gap-1">
                                    <button onClick={() => setIsDarkMode(!isDarkMode)} className="p-2.5 text-gray-500 hover:text-brand-primary dark:hover:text-white rounded-full bg-gray-50 dark:bg-gray-800 transition-colors"><Icon name={isDarkMode ? "Sun" : "Moon"} size={20} /></button>
                                    <button onClick={toggleA11yMenu} className="p-2.5 text-gray-500 hover:text-brand-primary dark:hover:text-white rounded-full bg-gray-50 dark:bg-gray-800 transition-colors"><Icon name="Accessibility" size={20} /></button>
                                </div>
                                <button onClick={()=>setIsMobileMenuOpen(!isMobileMenuOpen)} className="lg:hidden p-2 text-brand-primary dark:text-white"><Icon name={isMobileMenuOpen ? "X" : "Menu"} size={28}/></button>
                            </div>
                        </div>
                    </header>

                    {isMobileMenuOpen && (
                        <div className="lg:hidden border-t border-gray-100 dark:border-gray-800 bg-white dark:bg-gray-900 absolute w-full shadow-2xl pb-4 z-40">
                            <div className="px-4 pt-4 pb-4 space-y-2">
                                {navItems.map(item => (
                                    <button key={item.id} onClick={() => navigate(item.id)} className="w-full text-right px-4 py-3 rounded-xl flex items-center gap-3 font-bold text-gray-700 dark:text-gray-200 hover:bg-gray-50 dark:hover:bg-gray-800"><Icon name={item.icon} size={20} /> {item.label}</button>
                                ))}
                                {user?.isAdmin && <button onClick={() => navigate('admin')} className="w-full text-right px-4 py-3 rounded-xl flex items-center gap-3 font-bold text-brand-primary"><Icon name="Settings" size={20} /> ניהול</button>}
                            </div>
                        </div>
                    )}

                    {showAuthModal && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center bg-black/60 p-4 animate-fade-in">
                            <div className="bg-white dark:bg-gray-800 rounded-3xl p-8 max-w-sm w-full text-center relative shadow-2xl border border-gray-200 dark:border-gray-700">
                                <button onClick={() => setShowAuthModal(false)} className="absolute top-4 left-4 text-gray-400 hover:text-gray-800 dark:hover:text-white bg-gray-100 dark:bg-gray-700 p-2 rounded-full transition"><Icon name="X" size={20} /></button>
                                <Icon name={authMode === 'forgot_password' ? 'Mail' : 'User'} size={32} className="mx-auto mb-4 text-brand-primary dark:text-brand-secondary" />
                                <h3 className="text-2xl font-bold mb-2 text-gray-800 dark:text-white">{authMode === 'login' ? 'התחברות' : authMode === 'register' ? 'הרשמה' : 'איפוס סיסמה'}</h3>
                                
                                <form onSubmit={handleAuth} className="space-y-4 text-right animate-fade-in mt-6">
                                    {authMode === 'register' && (
                                        <div>
                                            <label className="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">שם מלא</label>
                                            <input type="text" required value={authName} onChange={e => setAuthName(e.target.value)} placeholder="לדוגמה: משה כהן" className="w-full border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-800 dark:text-white rounded-xl px-4 py-2 focus:border-brand-primary outline-none" />
                                        </div>
                                    )}
                                    
                                    <div>
                                        <label className="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">כתובת מייל</label>
                                        <input type="email" required value={authEmail} onChange={e => setAuthEmail(e.target.value)} placeholder="name@example.com" className="w-full border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-800 dark:text-white rounded-xl px-4 py-2 focus:border-brand-primary outline-none text-left" dir="ltr" />
                                    </div>
                                    
                                    {authMode !== 'forgot_password' && (
                                        <div>
                                            <label className="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">סיסמה</label>
                                            <input type="password" required value={authPassword} onChange={e => setAuthPassword(e.target.value)} placeholder="לפחות 6 תווים" className="w-full border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-800 dark:text-white rounded-xl px-4 py-2 focus:border-brand-primary outline-none text-left" dir="ltr" />
                                        </div>
                                    )}
                                    
                                    {authError && <div className="text-red-600 bg-red-50 dark:bg-red-900/30 p-2 rounded-lg text-sm text-center font-bold">{authError}</div>}

                                    <button type="submit" disabled={authLoading} className="w-full bg-brand-primary hover:bg-brand-dark text-white font-bold py-3 rounded-xl transition shadow mt-2 disabled:opacity-80 flex justify-center items-center gap-2">
                                        {authLoading ? <Icon name="RefreshCw" className="animate-spin" size={20} /> : authMode === 'login' ? 'היכנס למערכת' : authMode === 'register' ? 'צור חשבון' : 'שלח קישור לאיפוס'}
                                    </button>
                                </form>

                                <div className="mt-6 pt-4 border-t border-gray-100 dark:border-gray-700 flex flex-col gap-2 text-sm">
                                    {authMode === 'login' ? (
                                        <React.Fragment>
                                            <button onClick={() => { setAuthMode('register'); setAuthError(''); }} className="text-brand-secondary font-bold">אין לך חשבון? הרשמה</button>
                                            <button onClick={() => { setAuthMode('forgot_password'); setAuthError(''); }} className="text-gray-500">שכחת סיסמה?</button>
                                        </React.Fragment>
                                    ) : (
                                        <button onClick={() => { setAuthMode('login'); setAuthError(''); }} className="text-brand-secondary font-bold">חזור למסך ההתחברות</button>
                                    )}
                                </div>
                            </div>
                        </div>
                    )}

                    {showPaymentModal && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center bg-black/80 p-4 animate-fade-in overflow-y-auto">
                            <div className="relative w-full max-w-md my-8">
                                <button onClick={()=>setShowPaymentModal(false)} className="absolute -top-12 right-0 text-white bg-white/20 p-2 rounded-full"><Icon name="X" size={24}/></button>
                                <PayPalSubscription onSuccess={(id)=>{ const u={...user, isSubscribed:true}; setUser(u); localStorage.setItem('pisga_user', JSON.stringify(u)); setShowPaymentModal(false); setAlertMsg({t:"תודה",m:"המנוי הופעל בהצלחה!"}) }} />
                            </div>
                        </div>
                    )}

                    {showA11y && (
                        <div className="fixed top-28 left-4 sm:left-8 z-[100] flex flex-col items-start animate-fade-in">
                            <div className="bg-white dark:bg-gray-800 p-5 rounded-2xl shadow-2xl border-2 border-brand-secondary mb-3 w-64 text-right">
                                <div className="flex justify-between items-center mb-4 border-b border-gray-200 dark:border-gray-700 pb-3">
                                    <button onClick={toggleA11yMenu} className="text-gray-400 hover:text-red-500 transition"><Icon name="X" size={20} /></button>
                                    <h3 className="font-bold text-brand-primary dark:text-white flex items-center gap-2">נגישות <Icon name="Accessibility" size={20} className="text-brand-secondary" /></h3>
                                </div>
                                <div className="space-y-2.5">
                                    <button onClick={() => changeFontSize(2)} className="w-full bg-gray-50 dark:bg-gray-700 hover:bg-gray-200 dark:hover:bg-gray-600 text-gray-800 dark:text-white px-4 py-2.5 rounded-xl text-sm font-bold transition flex justify-between items-center">הגדל טקסט <Icon name="ZoomIn" size={16} /></button>
                                    <button onClick={() => changeFontSize(-2)} className="w-full bg-gray-50 dark:bg-gray-700 hover:bg-gray-200 dark:hover:bg-gray-600 text-gray-800 dark:text-white px-4 py-2.5 rounded-xl text-sm font-bold transition flex justify-between items-center">הקטן טקסט <Icon name="ZoomOut" size={16} /></button>
                                    <button onClick={toggleHighlightLinks} className="w-full bg-gray-50 dark:bg-gray-700 hover:bg-gray-200 dark:hover:bg-gray-600 text-gray-800 dark:text-white px-4 py-2.5 rounded-xl text-sm font-bold transition flex justify-between items-center">הדגשת קישורים <Icon name="Underline" size={16} /></button>
                                    <button onClick={toggleReadableFont} className="w-full bg-gray-50 dark:bg-gray-700 hover:bg-gray-200 dark:hover:bg-gray-600 text-gray-800 dark:text-white px-4 py-2.5 rounded-xl text-sm font-bold transition flex justify-between items-center">גופן קריא <Icon name="Type" size={16} /></button>
                                    <div className="w-full h-px bg-gray-200 dark:bg-gray-700 my-2"></div>
                                    <button onClick={resetA11y} className="w-full bg-red-50 dark:bg-red-900/30 text-red-600 hover:bg-red-100 dark:hover:bg-red-900/50 px-4 py-2.5 rounded-xl text-sm font-bold transition flex justify-between items-center">איפוס הגדרות <Icon name="RefreshCw" size={16} /></button>
                                </div>
                            </div>
                        </div>
                    )}

                    <main className="flex-1 pb-20 pt-8">
                        {currentPage==='admin' && user?.isAdmin ? <AdminPage forumTopics={forumTopics} setForumTopics={setForumTopics} setMessage={(m)=>setAlertMsg({t:"מערכת",m})} /> : 
                         currentPage==='courses' ? <CoursesPage courses={courses} user={user} onPlay={setGlobalFile} setShowPayment={setShowPaymentModal} /> : 
                         currentPage==='forum' ? <ForumPage topics={forumTopics} user={user} setShowAuthModal={setShowAuthModal} /> : 
                         currentPage==='about' ? <AboutPage /> :
                         currentPage==='youtube' ? <YoutubePage onFileInteract={setGlobalFile} /> : 
                         <HomePage navigate={navigate} />}
                    </main>

                    <button 
                        onClick={() => window.scrollTo({top: 0, behavior: 'smooth'})} 
                        className={`fixed bottom-20 sm:bottom-8 right-6 sm:left-6 sm:right-auto bg-brand-primary text-white p-3 rounded-full shadow-xl transition-all duration-300 z-40 hover:scale-110 ${showBackToTop ? 'opacity-100 translate-y-0' : 'opacity-0 translate-y-10 pointer-events-none'}`}
                    >
                        <Icon name="ArrowUp" size={24} />
                    </button>

                    <a href={WHATSAPP_LINK} target="_blank" rel="noopener noreferrer" className="whatsapp-float"><Icon name="MessageCircle" size={32}/></a>
                    
                    <footer className="bg-brand-dark dark:bg-gray-900 text-white py-10 transition-colors border-t-4 border-brand-secondary relative z-10">
                        <div className="max-w-7xl mx-auto px-4 text-center">
                            <h2 className="text-2xl font-black mb-2">קהילת פסגה</h2>
                            <p className="text-gray-400 mb-6">הבית העסקי למאמנים ומטפלים בהובלת משה וולנר</p>
                            <p className="text-sm text-gray-500 mb-1">© {new Date().getFullYear()} כל הזכויות שמורות.</p>
                            <p className="mt-3 text-sm text-brand-light/60 bg-black/20 inline-block px-4 py-1.5 rounded-full">
                                נבנה על ידי <a href="https://lev-good.github.io/Good-heart/" target="_blank" rel="noopener noreferrer" className="text-brand-secondary hover:text-white font-bold transition">לב טוב</a>
                            </p>
                        </div>
                    </footer>
                </div>
            );
        };

        const init = () => ReactDOM.createRoot(document.getElementById('root')).render(<App />);
        if (window.FB) init(); else window.addEventListener('firebaseReady', init);
    </script>
</body>
</html>
