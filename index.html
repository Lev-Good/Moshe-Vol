<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>קהילת פסגה - משה וולנר</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: {
                            primary: '#174353', // Blue-Petrol
                            secondary: '#d96c4a', // Rust-Orange
                            light: '#f8fafc',
                            dark: '#0f2933'
                        }
                    },
                    fontFamily: { sans: ['Heebo', 'sans-serif'] }
                }
            }
        }
    </script>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body { transition: background-color 0.3s ease, color 0.3s ease; }
        html.dark body { background-color: #0f172a; color: #f8fafc; }
        html:not(.dark) body { background-color: #f8fafc; color: #1e293b; }
        
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #d96c4a; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #174353; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
        
        @keyframes fadeOutSplash { from { opacity: 1; } to { opacity: 0; visibility: hidden; z-index: -1; } }
        .animate-splash-out { animation: fadeOutSplash 0.8s ease-in-out forwards; animation-delay: 1.5s; }
        
        @keyframes pulseSoft { 0% { transform: scale(0.95); opacity: 0.8; } 50% { transform: scale(1.05); opacity: 1; } 100% { transform: scale(0.95); opacity: 0.8; } }
        .animate-pulse-soft { animation: pulseSoft 2s infinite ease-in-out; }

        @keyframes fadeUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-up { animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0; }
        
        /* Floating WhatsApp Button */
        .whatsapp-float {
            position: fixed;
            width: 60px;
            height: 60px;
            bottom: 20px;
            left: 20px;
            background-color: #25d366;
            color: #FFF;
            border-radius: 50px;
            text-align: center;
            font-size: 30px;
            box-shadow: 2px 2px 10px rgba(0,0,0,0.2);
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }
        .whatsapp-float:hover { transform: scale(1.1); background-color: #128C7E; }
    </style>
</head>
<body className="antialiased">
    <div id="root"></div>

    <!-- Firebase SDK Imports (Built-in environment logic) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInAnonymously, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, query, onSnapshot, addDoc, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        
        window.FB = { initializeApp, getAuth, onAuthStateChanged, signInAnonymously, signInWithCustomToken, getFirestore, collection, query, onSnapshot, addDoc, deleteDoc, doc };
        window.dispatchEvent(new Event('firebaseReady'));
    </script>

    <script type="text/babel">
        // ----------------------------------------------------
        // Icons Component
        // ----------------------------------------------------
        const { 
            Home, Folder, FolderOpen, FileText, FileVideo, 
            Search, ChevronLeft, Menu, X, BookOpen, Info,
            PlayCircle, ExternalLink, ShieldCheck, TrendingUp,
            Mountain, User, LogOut, Lock, MessageCircle, RefreshCw,
            MessageSquare, Trash2, Ghost, Youtube, CheckCircle,
            CreditCard, Target, Lightbulb, Settings, Code, Plus, Link, Users
        } = lucide;

        const Icon = ({ name, size = 24, className = "" }) => {
            const spanRef = React.useRef(null);
            React.useEffect(() => {
                if (spanRef.current && window.lucide && window.lucide.icons[name]) {
                    const iElement = document.createElement('i');
                    iElement.setAttribute('data-lucide', name);
                    if (className) iElement.setAttribute('class', className);
                    iElement.setAttribute('width', size);
                    iElement.setAttribute('height', size);
                    spanRef.current.innerHTML = '';
                    spanRef.current.appendChild(iElement);
                    window.lucide.createIcons({ icons: { [name]: window.lucide.icons[name] }, root: spanRef.current });
                }
            }, [name, size, className]);
            return <span ref={spanRef} style={{ display: 'inline-flex', alignItems: 'center', justifyContent: 'center' }} />;
        };

        // ----------------------------------------------------
        // Initial Data 
        // ----------------------------------------------------
        const INITIAL_COURSES = [
            {
                id: "course_webinars",
                name: "סדרת הוובינרים המלאה",
                isFolder: true,
                lessons: [
                    { id: "w1", name: "וובינר מספר 1 - הדיפלומה הנסתרת", url: "https://drive.google.com/file/u/0/d/1Vriu7SyPzGt6lYEtU9HZZNmuXq2QYYH7/view", type: "video" },
                    { id: "w2", name: "וובינר מספר 2 - פרדוקס היעילות", url: "https://drive.google.com/file/d/1ryD7kd4GVKf189gJfm7AmpnG2KUhn8Ak/view", type: "video" },
                    { id: "w3", name: "וובינר מספר 3 - מנישה למוצר", url: "https://drive.google.com/file/d/1trpWtzIf9HtP82rJ7zoaYtvK77nsHuoJ/view", type: "video" },
                    { id: "w4", name: "וובינר מספר 4 - בניית הקפסולה", url: "https://drive.google.com/file/d/1U9q0-c-NLAhJg7H8NohVAVF3_zkkbJp2/view", type: "video" },
                    { id: "w5", name: "וובינר מספר 5 - שימוש בAI ומילון הכאב", url: "https://drive.google.com/file/d/1U9q0-c-NLAhJg7H8NohVAVF3_zkkbJp2/view", type: "video" },
                    { id: "w6", name: "וובינר מספר 6 - זיהוי וחסמי שיווק", url: "https://drive.google.com/file/d/1ocgx7J3lP-o7hLfg2dtdMmvtltbe2d-9/view", type: "video" }
                ]
            }
        ];

        const WHATSAPP_LINK = "https://chat.whatsapp.com/GxuIH8eUwKaIA4qr76Q9ws";
        const YOUTUBE_CHANNEL_URL = "https://www.youtube.com/@moshevol8942";

        // ----------------------------------------------------
        // Shared Components
        // ----------------------------------------------------
        const CustomMessageBox = ({ message, title="הודעת מערכת", onClose }) => (
            <div className="fixed inset-0 z-[9999] flex items-center justify-center bg-black/50 backdrop-blur-sm p-4 animate-fade-in">
                <div className="bg-white dark:bg-gray-800 rounded-2xl p-8 max-w-sm w-full text-center shadow-2xl border border-brand-primary/20">
                    <div className="w-16 h-16 bg-brand-primary/10 rounded-full flex items-center justify-center mx-auto mb-4 text-brand-primary">
                        <Icon name="Info" size={32} />
                    </div>
                    <h3 className="text-xl font-bold text-gray-800 dark:text-white mb-2">{title}</h3>
                    <p className="text-gray-600 dark:text-gray-300 mb-6 leading-relaxed">{message}</p>
                    <button onClick={onClose} className="w-full bg-brand-primary hover:bg-brand-dark text-white px-6 py-3 rounded-xl font-bold transition">
                        סגור
                    </button>
                </div>
            </div>
        );

        const SplashScreen = () => (
            <div className="fixed inset-0 z-[9999] bg-brand-light dark:bg-gray-900 flex flex-col items-center justify-center animate-splash-out">
                <div className="w-40 h-40 bg-brand-primary/10 dark:bg-brand-primary/20 rounded-full flex items-center justify-center animate-pulse-soft mb-6 shadow-[0_0_40px_rgba(217,108,74,0.3)]">
                    <Icon name="Mountain" size={80} className="text-brand-primary dark:text-brand-secondary" />
                </div>
                <h1 className="text-4xl sm:text-5xl font-black text-brand-primary tracking-tight">פסגה</h1>
                <p className="text-brand-secondary mt-3 font-bold text-xl tracking-wide">הבית העסקי למאמנים ומטפלים</p>
                <p className="text-gray-500 mt-2">בהובלת משה וולנר</p>
            </div>
        );

        // ----------------------------------------------------
        // PayPal Payment Component
        // ----------------------------------------------------
        const PayPalSubscription = ({ onSuccess }) => {
            React.useEffect(() => {
                if (!document.getElementById("paypal-sdk")) {
                    const script = document.createElement("script");
                    script.id = "paypal-sdk";
                    script.src = "https://www.paypal.com/sdk/js?client-id=AVzkCndNLYwIWWPkbYTSJh934d8VF-qKy1eyRXLAnyaXK2keXd2qcJ5DFBR2otfGSSNjYvdOa_lh4gla&vault=true&intent=subscription";
                    script.setAttribute("data-sdk-integration-source", "button-factory");
                    script.async = true;
                    
                    script.onload = () => {
                        if (window.paypal) {
                            window.paypal.Buttons({
                                style: { shape: 'rect', color: 'gold', layout: 'vertical', label: 'subscribe' },
                                createSubscription: function(data, actions) { return actions.subscription.create({ plan_id: 'P-2H242596WM328212DNHQMPHI' }); },
                                onApprove: function(data, actions) { onSuccess(data.subscriptionID); }
                            }).render('#paypal-button-container-P-2H242596WM328212DNHQMPHI');
                        }
                    };
                    document.body.appendChild(script);
                } else if (window.paypal) {
                    try {
                            window.paypal.Buttons({
                            style: { shape: 'rect', color: 'gold', layout: 'vertical', label: 'subscribe' },
                            createSubscription: function(data, actions) { return actions.subscription.create({ plan_id: 'P-2H242596WM328212DNHQMPHI' }); },
                            onApprove: function(data, actions) { onSuccess(data.subscriptionID); }
                        }).render('#paypal-button-container-P-2H242596WM328212DNHQMPHI');
                    } catch(e) { }
                }
            }, [onSuccess]);

            return (
                <div className="bg-white dark:bg-gray-800 p-8 rounded-2xl shadow-lg border border-gray-100 dark:border-gray-700 max-w-md mx-auto text-center">
                    <Icon name="CreditCard" size={48} className="text-brand-secondary mx-auto mb-4" />
                    <h3 className="text-2xl font-bold text-brand-primary dark:text-white mb-2">הצטרפות למועדון פסגה</h3>
                    <p className="text-gray-600 dark:text-gray-300 mb-6">קבלו גישה מלאה לכל הקורסים, הכלים והקהילה שלנו.</p>
                    <div id="paypal-button-container-P-2H242596WM328212DNHQMPHI" className="min-h-[150px]"></div>
                </div>
            );
        };

        // ----------------------------------------------------
        // Formatting Helper
        // ----------------------------------------------------
        const formatDate = (isoString) => {
            const d = new Date(isoString);
            return `${d.getDate()}/${d.getMonth()+1}/${d.getFullYear()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
        };

        // ----------------------------------------------------
        // Admin Panel Component
        // ----------------------------------------------------
        const AdminPage = ({ courses, setCourses, youtubeId, setYoutubeId, forumPosts, setForumPosts }) => {
            const [activeTab, setActiveTab] = React.useState('forum'); 
            const [scriptUrl, setScriptUrl] = React.useState(localStorage.getItem('pisga_script_url') || "");
            const [syncLoading, setSyncLoading] = React.useState(false);
            const [message, setMessage] = React.useState(null);

            const appsScriptCode = `// העתק והדבק את הקוד הבא ב- Google Apps Script
function doGet(e) {
  var MAIN_FOLDER_ID = 'הכנס_כאן_את_מזהה_התיקיה'; 
  try {
    var mainFolder = DriveApp.getFolderById(MAIN_FOLDER_ID);
    var courseFolders = mainFolder.getFolders();
    var courses = [];
    while (courseFolders.hasNext()) {
      var folder = courseFolders.next();
      var files = folder.getFiles();
      var lessons = [];
      while (files.hasNext()) {
        var file = files.next();
        lessons.push({ id: file.getId(), name: file.getName(), url: file.getUrl(), type: file.getMimeType().indexOf('video') > -1 ? 'video' : 'pdf' });
      }
      courses.push({ id: folder.getId(), name: folder.getName(), isFolder: true, lessons: lessons });
    }
    return ContentService.createTextOutput(JSON.stringify({status: 'success', data: courses})).setMimeType(ContentService.MimeType.JSON);
  } catch (error) {
    return ContentService.createTextOutput(JSON.stringify({status: 'error', message: error.toString()})).setMimeType(ContentService.MimeType.JSON);
  }
}`;

            const handleDriveSync = async () => {
                if(!scriptUrl) { setMessage("אנא הזן את כתובת ה-Web App של הסקריפט שלך."); return; }
                setSyncLoading(true);
                localStorage.setItem('pisga_script_url', scriptUrl);
                try {
                    const response = await fetch(scriptUrl);
                    const result = await response.json();
                    if(result.status === 'success') {
                        setCourses(result.data);
                        setMessage("הקורסים סונכרנו בהצלחה מהדרייב!");
                    } else { setMessage("שגיאה בסנכרון: " + result.message); }
                } catch (e) { setMessage("שגיאת תקשורת. ודא שהסקריפט מוגדר כ- 'Anyone' (כל אחד) ויש לו הרשאות."); }
                setSyncLoading(false);
            };

            const handleDeletePost = async (post) => {
                if(confirm("האם אתה בטוח שברצונך למחוק פוסט זה?")) {
                    if (window.db && post.dbId) {
                        try {
                            const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';
                            await window.FB.deleteDoc(window.FB.doc(window.db, 'artifacts', appId, 'public', 'data', 'forum_posts', post.dbId));
                            setMessage("הפוסט נמחק בהצלחה מענן המערכת.");
                        } catch (err) {
                            setMessage("שגיאה במחיקת הפוסט: " + err.message);
                        }
                    } else {
                        // Fallback local deletion
                        setForumPosts(forumPosts.filter(p => p.id !== post.id));
                        setMessage("הפוסט נמחק בהצלחה.");
                    }
                }
            };

            return (
                <div className="max-w-6xl mx-auto space-y-6 animate-fade-in pb-12">
                    {message && <CustomMessageBox message={message} onClose={() => setMessage(null)} />}
                    <div className="bg-white dark:bg-gray-800 rounded-3xl p-8 shadow-sm border border-brand-primary/20">
                        <div className="flex items-center gap-4 mb-8 border-b border-gray-200 dark:border-gray-700 pb-4">
                            <Icon name="Settings" size={32} className="text-brand-secondary" />
                            <h2 className="text-3xl font-black text-brand-primary dark:text-white">ממשק מנהל</h2>
                        </div>

                        <div className="flex gap-4 mb-8 border-b border-gray-200 dark:border-gray-700 pb-4 overflow-x-auto">
                            <button onClick={()=>setActiveTab('forum')} className={`px-6 py-2 rounded-full font-bold transition whitespace-nowrap flex items-center gap-2 ${activeTab==='forum' ? 'bg-brand-primary text-white' : 'bg-gray-100 dark:bg-gray-700 text-gray-600 dark:text-gray-300 hover:bg-gray-200'}`}><Icon name="MessageSquare" size={18}/> ניהול פורום קהילה</button>
                            <button onClick={()=>setActiveTab('drive')} className={`px-6 py-2 rounded-full font-bold transition whitespace-nowrap flex items-center gap-2 ${activeTab==='drive' ? 'bg-brand-primary text-white' : 'bg-gray-100 dark:bg-gray-700 text-gray-600 dark:text-gray-300 hover:bg-gray-200'}`}><Icon name="FolderOpen" size={18}/> סנכרון קורסים (Drive)</button>
                            <button onClick={()=>setActiveTab('youtube')} className={`px-6 py-2 rounded-full font-bold transition whitespace-nowrap flex items-center gap-2 ${activeTab==='youtube' ? 'bg-brand-primary text-white' : 'bg-gray-100 dark:bg-gray-700 text-gray-600 dark:text-gray-300 hover:bg-gray-200'}`}><Icon name="Youtube" size={18}/> הגדרות יוטיוב</button>
                        </div>

                        {activeTab === 'forum' && (
                            <div className="space-y-4">
                                <div className="flex items-center justify-between mb-4">
                                    <h3 className="text-xl font-bold text-gray-800 dark:text-white">ניהול הודעות ומשתמשים <span className="text-xs font-normal text-green-600 mr-2 border border-green-600 px-2 rounded-full inline-block">מחובר לענן בזמן אמת</span></h3>
                                    <span className="bg-brand-primary/10 text-brand-primary px-3 py-1 rounded-full text-sm font-bold">{forumPosts.length} הודעות בפורום</span>
                                </div>
                                
                                <div className="overflow-x-auto bg-gray-50 dark:bg-gray-900 rounded-xl border border-gray-200 dark:border-gray-700">
                                    <table className="w-full text-right text-sm">
                                        <thead>
                                            <tr className="bg-gray-200 dark:bg-gray-800 text-gray-700 dark:text-gray-300">
                                                <th className="p-4 font-bold w-1/6">תאריך</th>
                                                <th className="p-4 font-bold w-1/4">מחבר (שם אמיתי)</th>
                                                <th className="p-4 font-bold w-1/2">תוכן ההודעה</th>
                                                <th className="p-4 font-bold w-1/12 text-center">פעולות</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            {forumPosts.length === 0 ? (
                                                <tr><td colSpan="4" className="p-8 text-center text-gray-500">אין הודעות בפורום כרגע.</td></tr>
                                            ) : (
                                                forumPosts.map(post => (
                                                    <tr key={post.id} className="border-t border-gray-200 dark:border-gray-700 hover:bg-white dark:hover:bg-gray-800 transition-colors">
                                                        <td className="p-4 text-gray-600 dark:text-gray-400 align-top">{formatDate(post.date)}</td>
                                                        <td className="p-4 align-top">
                                                            <div className="font-bold text-gray-800 dark:text-white">{post.realAuthor}</div>
                                                            {post.isAnonymous && (
                                                                <span className="inline-block mt-1 text-xs bg-brand-secondary/10 text-brand-secondary border border-brand-secondary/20 px-2 py-0.5 rounded-md">
                                                                    הוצג כאנונימי
                                                                </span>
                                                            )}
                                                            {post.isAdminPost && (
                                                                <span className="inline-block mt-1 text-xs bg-brand-primary/10 text-brand-primary border border-brand-primary/20 px-2 py-0.5 rounded-md">
                                                                    הודעת הנהלה
                                                                </span>
                                                            )}
                                                        </td>
                                                        <td className="p-4 text-gray-700 dark:text-gray-300 align-top whitespace-pre-wrap">
                                                            {post.content}
                                                        </td>
                                                        <td className="p-4 align-top text-center">
                                                            <button onClick={() => handleDeletePost(post)} className="text-red-500 hover:text-white hover:bg-red-500 p-2 rounded-lg transition-colors" title="מחק פוסט">
                                                                <Icon name="Trash2" size={18} />
                                                            </button>
                                                        </td>
                                                    </tr>
                                                ))
                                            )}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        )}

                        {activeTab === 'drive' && (
                            <div className="space-y-6">
                                <div className="bg-blue-50 dark:bg-blue-900/20 p-6 rounded-2xl border border-blue-200 dark:border-blue-800">
                                    <h3 className="text-xl font-bold text-blue-800 dark:text-blue-300 mb-2">משיכת קורסים מגוגל דרייב</h3>
                                    <p className="text-sm text-blue-700 dark:text-blue-400 mb-4 leading-relaxed">
                                        כדי שהאתר ימשוך אוטומטית את כל הקורסים והשיעורים שלך מתיקיית הדרייב הראשית, עליך ליצור "Google Apps Script" שינגיש את המידע.
                                    </p>
                                    <ol className="list-decimal list-inside text-sm text-blue-800 dark:text-blue-300 space-y-2 mb-4 font-medium">
                                        <li>כנסו ל- <a href="https://script.google.com" target="_blank" className="underline font-bold">script.google.com</a> וצרו פרויקט חדש.</li>
                                        <li>העתיקו את הקוד שלמטה והדביקו בעורך ה-Script.</li>
                                        <li>החליפו את המזהה (ID) בקוד למזהה של תיקיית הקורסים הראשית שלכם בדרייב.</li>
                                        <li>לחצו על "פריסה" (Deploy) -> "פריסה חדשה", בחרו סוג "אפליקציית אינטרנט" (Web App).</li>
                                        <li>בהרשאות (Who has access) בחרו "Anyone" (כל אחד) ואשרו.</li>
                                        <li>העתיקו את "כתובת ה-URL של אפליקציית האינטרנט" שנוצרה והדביקו אותה כאן למטה.</li>
                                    </ol>
                                    <div className="relative">
                                        <div className="absolute top-2 left-2 bg-gray-800 text-xs text-white px-2 py-1 rounded">קוד ל-Apps Script</div>
                                        <textarea readOnly value={appsScriptCode} className="w-full h-64 bg-gray-900 text-green-400 p-4 rounded-xl font-mono text-sm border-none focus:ring-0" dir="ltr"></textarea>
                                    </div>
                                </div>
                                
                                <div className="flex flex-col sm:flex-row gap-4">
                                    <input 
                                        type="text" 
                                        placeholder="הדבק כאן את כתובת ה- Web App URL שיצרת בגוגל" 
                                        value={scriptUrl} 
                                        onChange={e => setScriptUrl(e.target.value)}
                                        className="flex-1 border border-gray-300 dark:border-gray-600 rounded-xl px-4 py-3 bg-white dark:bg-gray-700 text-left" dir="ltr"
                                    />
                                    <button onClick={handleDriveSync} disabled={syncLoading} className="bg-brand-secondary hover:bg-[#c15c3c] text-white px-8 py-3 rounded-xl font-bold transition flex items-center justify-center gap-2 w-full sm:w-auto shrink-0">
                                        <Icon name="RefreshCw" className={syncLoading ? "animate-spin" : ""} size={20} />
                                        {syncLoading ? "מסנכרן..." : "משוך נתונים מהדרייב"}
                                    </button>
                                </div>
                            </div>
                        )}

                        {activeTab === 'youtube' && (

        // ----------------------------------------------------

        // ----------------------------------------------------
        // Global Modal for viewing files
        // ----------------------------------------------------
        const GlobalFileViewer = ({ file, onClose }) => {
            if (!file) return null;
            const getEmbedUrl = (file) => {
                if (file.type === 'youtube' || file.url.includes('youtube.com') || file.url.includes('youtu.be')) {
                    const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
                    const match = file.url.match(regExp);
                    if (match && match[2].length === 11) return `https://www.youtube.com/embed/${match[2]}?autoplay=1`;
                }
                if (file.url.includes('drive.google.com')) return file.url.replace(/\/view.*$/, '/preview');
                return file.url;
            };
            const embedUrl = getEmbedUrl(file);
            const isYoutube = file.type === 'youtube' || embedUrl.includes('youtube.com/embed');

            return (
                <div className="fixed inset-0 z-[9999] flex items-center justify-center bg-black/90 backdrop-blur-sm p-2 md:p-8 animate-fade-in">
                    <div className="bg-black w-full max-w-6xl h-full md:h-[85vh] rounded-2xl overflow-hidden flex flex-col shadow-2xl border border-gray-800">
                        <div className="bg-gray-900 text-white p-4 flex justify-between items-center shadow-md z-10">
                            <div className="flex items-center gap-3 truncate pr-4">
                                <Icon name={isYoutube ? "Youtube" : "PlayCircle"} size={24} className={isYoutube ? "text-red-500" : "text-brand-secondary"} />
                                <h3 className="font-bold text-lg truncate" dir="rtl">{file.name}</h3>
                            </div>
                            <button onClick={onClose} className="p-2 hover:bg-gray-800 rounded-full transition-colors shrink-0"><Icon name="X" size={24} /></button>
                        </div>
                        <div className="flex-1 relative w-full h-full bg-black flex items-center justify-center">
                            {embedUrl ? <iframe src={embedUrl} className="w-full h-full border-none absolute inset-0" allow="autoplay; fullscreen" allowFullScreen title={file.name}></iframe> : 
                            <a href={file.url} target="_blank" rel="noopener noreferrer" className="bg-brand-primary text-white px-6 py-3 rounded-full flex items-center gap-2">פתיחת הקובץ בחלון חדש <Icon name="ExternalLink" size={16} /></a>}
                        </div>
                    </div>
                </div>
            );
        };


        // ----------------------------------------------------
        // Main App Component
        // ----------------------------------------------------
        const App = () => {
            const [showSplash, setShowSplash] = React.useState(true);
            const [isDarkMode, setIsDarkMode] = React.useState(() => localStorage.getItem('darkMode') === 'true');
            
            // App States
            const [user, setUser] = React.useState(() => {
                const savedUser = localStorage.getItem('pisga_user');
                return savedUser ? JSON.parse(savedUser) : null;
            });
            const [courses, setCourses] = React.useState(() => {
                const saved = localStorage.getItem('pisga_courses');
                return saved ? JSON.parse(saved) : INITIAL_COURSES;
            });
            const [forumPosts, setForumPosts] = React.useState(() => {
                const saved = localStorage.getItem('pisga_forum_posts');
                return saved ? JSON.parse(saved) : []; // Cloud fallback defaults to empty array until fetch
            });
            const [ytChannelId, setYoutubeId] = React.useState(localStorage.getItem('pisga_yt_id') || "");
            
            const [currentPage, setCurrentPage] = React.useState('home');
            const [isMobileMenuOpen, setIsMobileMenuOpen] = React.useState(false);
            const [globalFile, setGlobalFile] = React.useState(null);
            const [alertMessage, setAlertMessage] = React.useState(null);

            // Modals State
            const [showAuthModal, setShowAuthModal] = React.useState(false);
            const [showPaymentModal, setShowPaymentModal] = React.useState(false);
            const [authName, setAuthName] = React.useState('');

            // Cloud DB State
            const [fbUser, setFbUser] = React.useState(null);

            React.useEffect(() => { setTimeout(() => setShowSplash(false), 2000); }, []);
            React.useEffect(() => { document.documentElement.classList.toggle('dark', isDarkMode); localStorage.setItem('darkMode', isDarkMode); }, [isDarkMode]);
            React.useEffect(() => { localStorage.setItem('pisga_courses', JSON.stringify(courses)); }, [courses]);
            
            // Save local fallback just in case
            React.useEffect(() => { if (!window.db) localStorage.setItem('pisga_forum_posts', JSON.stringify(forumPosts)); }, [forumPosts]);

            // --- Cloud Setup (Firebase / Firestore) ---
            React.useEffect(() => {
                if (!window.FB) return;
                try {
                    const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : null;
                    if (!firebaseConfig) return;
                    
                    const app = window.FB.initializeApp(firebaseConfig);
                    const auth = window.FB.getAuth(app);
                    window.db = window.FB.getFirestore(app);
                    
                    const initAuth = async () => {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await window.FB.signInWithCustomToken(auth, __initial_auth_token);
                        } else {
                            await window.FB.signInAnonymously(auth);
                        }
                    };
                    initAuth();
                    
                    const unsubscribe = window.FB.onAuthStateChanged(auth, setFbUser);
                    return () => unsubscribe();
                } catch(e) {
                    console.log("Cloud db not configured, falling back to local storage.", e);
                }
            }, []);

            // --- Fetch Posts from Cloud ---
            React.useEffect(() => {
                if (!fbUser || !window.db) return;
                const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';
                
                const q = window.FB.collection(window.db, 'artifacts', appId, 'public', 'data', 'forum_posts');
                
                const unsubscribe = window.FB.onSnapshot(q, (snapshot) => {
                    const posts = [];
                    snapshot.forEach(doc => {
                        posts.push({ dbId: doc.id, ...doc.data() });
                    });
                    // Sort descending by date
                    posts.sort((a, b) => new Date(b.date) - new Date(a.date));
                    setForumPosts(posts);
                }, (error) => {
                    console.error("Cloud Error: ", error);
                });
                
                return () => unsubscribe();
            }, [fbUser]);

            const handleAuthSubmit = (e) => {
                e.preventDefault();
                const isAdmin = authName.includes("משה וולנר") || authName.includes("מנהל");
                const loggedUser = { name: authName || 'משתמש', isSubscribed: isAdmin, isAdmin: isAdmin };
                localStorage.setItem('pisga_user', JSON.stringify(loggedUser));
                setUser(loggedUser);
                setShowAuthModal(false);
                setAlertMessage({title: "התחברת בהצלחה", text: `ברוך הבא, ${loggedUser.name}!`});
            };

            const handleLogout = () => { localStorage.removeItem('pisga_user'); setUser(null); };

            const handlePaymentSuccess = (subscriptionID) => {
                const finalUser = user ? { ...user, isSubscribed: true, subId: subscriptionID } : { name: 'חבר מועדון', isSubscribed: true, subId: subscriptionID };
                localStorage.setItem('pisga_user', JSON.stringify(finalUser));
                setUser(finalUser);
                setShowPaymentModal(false);
                setAlertMessage({title: "תשלום אושר", text: "תודה רבה! המנוי שלך אושר בהצלחה. כעת כל הקורסים פתוחים עבורך."});
            };

            React.useEffect(() => {
                const handleHashChange = () => {
                    const hash = window.location.hash.replace('#', '') || 'home';
                    setCurrentPage(hash);
                };
                handleHashChange(); 
                window.addEventListener('hashchange', handleHashChange);
                return () => window.removeEventListener('hashchange', handleHashChange);
            }, []);

            React.useEffect(() => { window.scrollTo(0, 0); }, [currentPage]);

            const navigate = (pageId) => { window.location.hash = pageId; setIsMobileMenuOpen(false); };

            const navItems = [
                { id: 'home', label: 'ראשי', icon: 'Home' },
                { id: 'explorer', label: 'קורסי המועדון', icon: 'FolderOpen' },
                { id: 'forum', label: 'פורום תלמידים', icon: 'MessageSquare' },
                { id: 'youtube', label: 'ספריית וידאו (חינם)', icon: 'Youtube' }
            ];

            const renderPage = () => {
                if(currentPage === 'admin' && user?.isAdmin) return <AdminPage courses={courses} setCourses={setCourses} youtubeId={ytChannelId} setYoutubeId={setYoutubeId} forumPosts={forumPosts} setForumPosts={setForumPosts} />;
                switch(currentPage) {
                    case 'explorer': return <ExplorerPage onFileInteract={setGlobalFile} user={user} setShowPayment={setShowPaymentModal} courses={courses} />;
                    case 'forum': return <ForumPage user={user} setShowAuthModal={setShowAuthModal} posts={forumPosts} setPosts={setForumPosts} />;
                    case 'youtube': return <YoutubePage onFileInteract={setGlobalFile} ytChannelId={ytChannelId} />;
                    default: 
                        return (
                            <div className="animate-fade-in space-y-16 relative max-w-6xl mx-auto">
                                <div className="bg-gradient-to-br from-brand-primary to-brand-dark rounded-3xl shadow-2xl overflow-hidden relative text-white">
                                    <div className="absolute top-0 right-0 w-64 h-64 bg-brand-secondary/20 rounded-full blur-3xl -mr-20 -mt-20"></div>
                                    <div className="p-8 md:p-16 text-center relative z-10 max-w-4xl mx-auto">
                                        <Icon name="Mountain" size={64} className="mx-auto mb-6 text-brand-secondary" />
                                        <h1 className="text-4xl md:text-6xl font-black mb-6 animate-fade-up">ברוכים הבאים לקהילת <span className="text-brand-secondary">"פסגה"</span></h1>
                                        <h2 className="text-xl md:text-3xl font-bold text-gray-200 mb-8 animate-fade-up">בהובלת משה וולנר <span className="mx-2 opacity-50">|</span> מלווה עסקי למאמנים ומטפלים</h2>
                                        <p className="text-lg md:text-xl text-gray-300 mb-10 leading-relaxed font-medium animate-fade-up max-w-2xl mx-auto">הקמתי את הקהילה כדי לתת בית מקצועי, כלים לצמיחה וגישה ישירה למאגר ידע איכותי.</p>
                                        <div className="flex flex-col sm:flex-row justify-center gap-4 animate-fade-up">
                                            <button onClick={() => setShowPaymentModal(true)} className="bg-brand-secondary hover:bg-[#c15c3c] text-white px-8 py-4 rounded-full font-bold text-lg shadow-lg flex items-center justify-center gap-2"><Icon name="Lock" size={20} /> הצטרפו עכשיו למועדון</button>
                                            <button onClick={() => navigate('explorer')} className="bg-white/10 hover:bg-white/20 border border-white/30 text-white px-8 py-4 rounded-full font-bold text-lg flex items-center justify-center gap-2"><Icon name="FolderOpen" size={20} /> צפייה בקורסים</button>
                                        </div>
                                    </div>
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-8 mt-4">
                                    {[{icon:'Target', title:'מיקוד עסקי', text:'כלים פרקטיים להפיכת הכישרון לעסק משגשג.'}, {icon:'Lightbulb', title:'מומחה יוצר', text:'יציאה מהקליניקה לבמה ובניית מוצרים.'}, {icon:'Users', title:'קהילה תומכת', text:'פורום קהילתי, סביבה מקצועית להתייעצות וצמיחה.'}].map((f,i) => (
                                        <div key={i} className="bg-white dark:bg-gray-800 p-8 rounded-2xl shadow-sm border border-gray-100 dark:border-gray-700 text-center">
                                            <div className="bg-brand-primary/10 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4 text-brand-primary dark:text-brand-secondary"><Icon name={f.icon} size={32} /></div>
                                            <h3 className="text-xl font-bold text-brand-primary dark:text-white mb-2">{f.title}</h3>
                                            <p className="text-gray-600 dark:text-gray-400">{f.text}</p>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        );
                }
            };

            return (
                <div className="min-h-screen flex flex-col font-sans relative pb-20 md:pb-0 bg-gray-50 dark:bg-[#0b1b24]">
                    {showSplash && <SplashScreen />}
                    {alertMessage && <CustomMessageBox title={alertMessage.title} message={alertMessage.text} onClose={() => setAlertMessage(null)} />}
                    <GlobalFileViewer file={globalFile} onClose={() => setGlobalFile(null)} />
                    
                    {/* Header */}
                    <header className="bg-white dark:bg-gray-900 shadow-sm sticky top-0 z-50 border-b-4 border-brand-secondary">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                            <div className="flex justify-between items-center h-20">
                                <div className="flex items-center gap-3 cursor-pointer group" onClick={() => navigate('home')}>
                                    <Icon name="Mountain" size={36} className="text-brand-primary dark:text-brand-secondary group-hover:scale-110 transition-transform" />
                                    <div><h1 className="font-black text-xl text-brand-primary dark:text-white leading-none">פסגה</h1></div>
                                </div>

                                <div className="flex items-center gap-2 sm:gap-4">
                                    <nav className="hidden lg:flex gap-1">
                                        {navItems.map(item => (
                                            <button key={item.id} onClick={() => navigate(item.id)} className={`px-4 py-2 rounded-full flex items-center gap-2 font-bold transition-all text-sm ${currentPage === item.id ? 'bg-brand-primary text-white dark:bg-brand-secondary' : 'text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-800'}`}>
                                                <Icon name={item.icon} size={18} /> {item.label}
                                            </button>
                                        ))}
                                        {user?.isAdmin && (
                                            <button onClick={() => navigate('admin')} className={`px-4 py-2 rounded-full flex items-center gap-2 font-bold transition-all text-sm ${currentPage === 'admin' ? 'bg-gray-800 text-white' : 'text-gray-600 hover:bg-gray-200'}`}>
                                                <Icon name="Settings" size={18} /> ממשק מנהל
                                            </button>
                                        )}
                                    </nav>

                                    <div className="w-px h-6 bg-gray-200 dark:bg-gray-700 hidden lg:block mx-2"></div>

                                    <div className="flex items-center gap-2">
                                        {!user ? (
                                            <button onClick={() => setShowAuthModal(true)} className="text-sm font-bold text-brand-primary border border-brand-primary/30 rounded-full px-4 py-1.5 hover:bg-brand-primary hover:text-white transition">התחברות</button>
                                        ) : (
                                            <div className="flex items-center gap-3 bg-gray-100 dark:bg-gray-800 px-3 py-1.5 rounded-full">
                                                <span className="text-sm font-bold truncate max-w-[100px]">{user.name}</span>
                                                <button onClick={handleLogout} className="text-gray-400 hover:text-red-500 p-1"><Icon name="LogOut" size={16} /></button>
                                            </div>
                                        )}
                                    </div>

                                    <button onClick={() => setIsDarkMode(!isDarkMode)} className="hidden sm:block p-2 text-gray-500 hover:text-brand-primary rounded-full"><Icon name={isDarkMode ? "Sun" : "Moon"} size={20} /></button>
                                    <button onClick={() => setIsMobileMenuOpen(!isMobileMenuOpen)} className="lg:hidden p-2 text-brand-primary"><Icon name={isMobileMenuOpen ? "X" : "Menu"} size={26} /></button>
                                </div>
                            </div>
                        </div>

                        {/* Mobile Menu */}
                        {isMobileMenuOpen && (
                            <div className="lg:hidden border-t border-gray-100 dark:border-gray-800 bg-white dark:bg-gray-900 absolute w-full shadow-2xl pb-4 z-40">
                                <div className="px-4 pt-4 pb-4 space-y-2">
                                    {navItems.map(item => (
                                        <button key={item.id} onClick={() => navigate(item.id)} className="w-full text-right px-4 py-3 rounded-xl flex items-center gap-3 font-bold text-gray-700 dark:text-gray-200"><Icon name={item.icon} size={20} /> {item.label}</button>
                                    ))}
                                    {user?.isAdmin && <button onClick={() => navigate('admin')} className="w-full text-right px-4 py-3 rounded-xl flex items-center gap-3 font-bold text-brand-primary"><Icon name="Settings" size={20} /> ממשק מנהל</button>}
                                </div>
                            </div>
                        )}
                    </header>

                    {/* Modals */}
                    {showAuthModal && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center bg-black/60 backdrop-blur-sm p-4 animate-fade-in">
                            <div className="bg-white dark:bg-gray-800 rounded-3xl p-8 max-w-sm w-full text-center relative shadow-2xl">
                                <button onClick={() => setShowAuthModal(false)} className="absolute top-4 left-4 p-2 bg-gray-100 rounded-full"><Icon name="X" size={20} /></button>
                                <div className="w-16 h-16 bg-brand-primary/10 rounded-full flex items-center justify-center mx-auto mb-4 text-brand-primary"><Icon name="User" size={32} /></div>
                                <h3 className="text-2xl font-bold mb-6">התחברות</h3>
                                <form onSubmit={handleAuthSubmit} className="space-y-4">
                                    <input type="text" required value={authName} onChange={e=>setAuthName(e.target.value)} placeholder="הזן שם מלא (למנהל: 'משה וולנר')" className="w-full border rounded-xl px-4 py-3" />
                                    <button type="submit" className="w-full bg-brand-primary text-white font-bold py-3 rounded-xl">היכנס</button>
                                </form>
                            </div>
                        </div>
                    )}

                    {showPaymentModal && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center bg-black/80 p-4 overflow-y-auto animate-fade-in">
                            <div className="relative w-full max-w-md my-8">
                                <button onClick={() => setShowPaymentModal(false)} className="absolute -top-12 right-0 text-white bg-white/20 p-2 rounded-full"><Icon name="X" size={24} /></button>
                                <PayPalSubscription onSuccess={handlePaymentSuccess} />
                            </div>
                        </div>
                    )}

                    {/* Main Content */}
                    <main className="flex-1 w-full pb-16 pt-8 relative z-10 px-4">
                        {renderPage()}
                    </main>

                    {/* WhatsApp Float */}
                    <a href={WHATSAPP_LINK} target="_blank" rel="noopener noreferrer" className="whatsapp-float" title="הצטרפו לקבוצת הוואטסאפ">
                        <Icon name="MessageCircle" size={32} />
                    </a>

                    {/* Footer */}
                    <footer className="bg-brand-dark text-white py-10 mt-auto">
                        <div className="max-w-7xl mx-auto px-4 text-center">
                            <h2 className="text-2xl font-black mb-2">קהילת פסגה</h2>
                            <p className="text-gray-400 mb-6">הבית העסקי למאמנים ומטפלים בהובלת משה וולנר</p>
                            <p className="text-sm text-gray-500">© {new Date().getFullYear()} כל הזכויות שמורות.</p>
                        </div>
                    </footer>
                </div>
            );
        };

        // Render React only after the Cloud scripts are loaded
        const initReact = () => {
            const root = ReactDOM.createRoot(document.getElementById('root'));
            root.render(<App />);
        };
        
        if (window.FB) {
            initReact();
        } else {
            window.addEventListener('firebaseReady', initReact);
        }
    </script>
</body>
</html>
