        const AdminPage = ({ forumTopics, setForumTopics, setMessage }) => {
            const handleDeleteTopic = async (topic) => {
                if(confirm(`האם אתה בטוח שברצונך למחוק את הנושא: "${topic.title}" ואת כל התגובות שלו?`)) {
                    if (window.db && topic.dbId) {
                        try {

                        setForumTopics(forumTopics.filter(t => t.id !== topic.id));
                        setMessage("הנושא נמחק בהצלחה (מקומי).");
                    }

            const handleDeleteReply = async (topic, replyId) => {

                    const updatedReplies = topic.replies.filter(r => r.id !== replyId);
                    if (window.db && topic.dbId) {

                            setMessage("התגובה נמחקה.");
                        } catch (err) { setMessage("שגיאה במחיקת תגובה: " + err.message); }
                    } else {
                        setForumTopics(forumTopics.map(t => t.id === topic.id ? { ...t, replies: updatedReplies } : t));
                        setMessage("התגובה נמחקה (מקומי).");
                    }
                }
            };

                                                <div className="text-sm text-gray-600 dark:text-gray-400 mt-1">

            const displayItems = () => {
                if (searchQuery.trim() !== "") {
                    let results = [];
                    courses.forEach(course => {
                        course.lessons.forEach(lesson => {
                            if (lesson.name.toLowerCase().includes(searchQuery.toLowerCase()) || course.name.toLowerCase().includes(searchQuery.toLowerCase())) {
                                results.push({ ...lesson, courseName: course.name });
                            }
                        });
                    });
                    return results;
                }
                if (currentFolder) return currentFolder.lessons;
                return courses;
            };

            const items = displayItems();

            return (
                <div className="bg-white dark:bg-gray-800 rounded-2xl shadow-sm border border-gray-200 dark:border-gray-700 overflow-hidden min-h-[600px] flex flex-col relative animate-fade-in max-w-6xl mx-auto">
                    
                    {!isSubscribed && !user?.isAdmin && (
                        <div className="bg-brand-secondary/10 dark:bg-brand-secondary/20 border-b border-brand-secondary/30 p-4 flex flex-col sm:flex-row items-center justify-between gap-4">
                            <div className="flex items-center gap-3">
                                <Icon name="Lock" className="text-brand-secondary" />
                                <span className="font-bold text-gray-800 dark:text-gray-200">צפייה בשיעורים דורשת מנוי פעיל במועדון.</span>
                            </div>
                            <button onClick={() => setShowPayment(true)} className="bg-brand-secondary hover:bg-[#c15c3c] text-white px-6 py-2 rounded-xl text-sm font-bold transition w-full sm:w-auto shadow-md">
                                פתיחת הגישה לקורסים
                            </button>
                        </div>
                    )}

                    <div className="bg-gray-50 dark:bg-gray-900 p-4 border-b border-gray-200 dark:border-gray-700 flex flex-col md:flex-row justify-between items-center gap-4">
                        <div className="flex items-center gap-2 text-gray-600 dark:text-gray-300 font-medium overflow-x-auto w-full md:w-auto whitespace-nowrap scrollbar-hide">
                            <button onClick={() => {setCurrentFolder(null); setSearchQuery("");}} className="hover:text-brand-primary dark:hover:text-white p-1 flex items-center gap-1">
                                <Icon name="FolderOpen" size={20} /> <span className="font-bold">ספריית הקורסים המלאה</span>
                            </button>
                            {currentFolder && (
                                <React.Fragment>
                                    <Icon name="ChevronLeft" size={16} className="text-gray-400" />
                                    <span className="text-brand-primary dark:text-brand-secondary font-bold">{currentFolder.name}</span>
                                </React.Fragment>
                            )}
                        </div>
                        
                        <div className="relative w-full md:w-64">
                            <input 
                                type="text" placeholder="חיפוש שיעורים..." value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)}
                                className="w-full pl-4 pr-10 py-2 rounded-full border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-800 text-gray-800 dark:text-gray-100 focus:outline-none focus:border-brand-primary text-sm transition-colors"
                            />
                            <div className="absolute top-2.5 right-3 text-gray-400 dark:text-gray-500"><Icon name="Search" size={18} /></div>
                        </div>
                    </div>

                    <div className="p-6 flex-1 overflow-y-auto">
                        {items.length === 0 ? (
                            <div className="flex flex-col items-center justify-center h-full text-gray-400 dark:text-gray-500 py-12">
                                <Icon name="FolderOpen" size={64} className="mb-4 opacity-50" />
                                <p className="text-lg">לא נמצאו תכנים.</p>
                            </div>
                        ) : (
                            <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
                                {items.map(item => (
                                    item.isFolder ? (
                                        <div key={item.id} onClick={() => handleItemClick(item, true)} className="group flex flex-col items-center justify-center p-8 bg-gradient-to-b from-gray-50 to-white dark:from-gray-700/50 dark:to-gray-800 rounded-2xl border border-gray-200 dark:border-gray-600 hover:border-brand-primary dark:hover:border-brand-secondary hover:shadow-lg cursor-pointer transition-all">
                                            <Icon name="Folder" className="text-brand-primary dark:text-brand-secondary mb-4 group-hover:scale-110 transition-transform" size={56} />
                                            <span className="text-gray-800 dark:text-gray-200 font-black text-center text-lg">{item.name}</span>
                                            <span className="text-gray-500 text-sm mt-2">{item.lessons.length} שיעורים</span>
                                        </div>
                                    ) : (
                                        <div key={item.id} onClick={() => handleItemClick(item, false)} className="group flex flex-col p-5 bg-white dark:bg-gray-800 rounded-2xl border border-gray-200 dark:border-gray-700 hover:border-brand-secondary dark:hover:border-brand-secondary hover:shadow-md transition-all cursor-pointer relative overflow-hidden h-full">
                                            {(!isSubscribed && !user?.isAdmin) && (
                                                <div className="absolute top-3 left-3 text-brand-secondary opacity-70 bg-white/80 dark:bg-gray-800/80 p-1 rounded-full">
                                                    <Icon name="Lock" size={16} />
                                                </div>
                                            )}
                                            <div className="w-12 h-12 bg-brand-primary/10 rounded-xl flex items-center justify-center mb-4 text-brand-primary dark:text-white group-hover:bg-brand-secondary group-hover:text-white transition-colors">
                                                <Icon name={item.type === 'pdf' ? "FileText" : "PlayCircle"} size={24} />
                                            </div>
                                            <span className="text-gray-800 dark:text-gray-200 font-bold text-base leading-snug mb-2 flex-1" dir="rtl">{item.name}</span>
                                            {item.courseName && <span className="text-xs text-gray-500 bg-gray-100 dark:bg-gray-700 px-2 py-1 rounded inline-block mt-auto w-max">{item.courseName}</span>}
                                        </div>
                                    )
                                ))}
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        // ----------------------------------------------------
        // Forum Page (Threads & Replies)
        // ----------------------------------------------------
        const ForumPage = ({ user, setShowAuthModal, topics, setTopics }) => {
            const [currentTopic, setCurrentTopic] = React.useState(null);
            
            // New Topic Form
            const [newTopicTitle, setNewTopicTitle] = React.useState("");
            const [newTopicContent, setNewTopicContent] = React.useState("");
            const [isAnonymousTopic, setIsAnonymousTopic] = React.useState(false);
            
            // New Reply Form
            const [newReplyContent, setNewReplyContent] = React.useState("");
            const [isAnonymousReply, setIsAnonymousReply] = React.useState(false);
            
            const [isPublishing, setIsPublishing] = React.useState(false);

            const isAdmin = user && user.isAdmin;

            // -- Create New Topic --
            const handleCreateTopic = async (e) => {
                e.preventDefault();
                if (!user) { setShowAuthModal(true); return; }
                if (!newTopicTitle.trim() || !newTopicContent.trim()) return;

                setIsPublishing(true);
                const newTopic = {
                    id: Date.now().toString(),
                    title: newTopicTitle,
                    content: newTopicContent,
                    author: isAnonymousTopic ? 'משתמש אנונימי' : user.name,
                    realAuthor: user.name,
                    date: new Date().toISOString(),
                    isAnonymous: isAnonymousTopic,
                    isAdminPost: isAdmin && !isAnonymousTopic,
                    replies: []
                };

                if (window.db) {
                    try {
                        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';
                        await window.FB.addDoc(window.FB.collection(window.db, 'artifacts', appId, 'public', 'data', 'forum_topics'), newTopic);
                    } catch(err) {
                        alert("שגיאה בחיבור לענן. הפוסט יישמר מקומית.");
                        setTopics([newTopic, ...topics]);
                    }
                } else {
                    setTopics([newTopic, ...topics]); 
                }

                setNewTopicTitle("");
                setNewTopicContent("");
                setIsAnonymousTopic(false);
                setIsPublishing(false);
            };

            // -- Add Reply to Topic --
            const handleAddReply = async (e) => {
                e.preventDefault();
                if (!user) { setShowAuthModal(true); return; }
                if (!newReplyContent.trim() || !currentTopic) return;

                setIsPublishing(true);
                const newReply = {
                    id: Date.now().toString(),
                    content: newReplyContent,
                    author: isAnonymousReply ? 'משתמש אנונימי' : user.name,
                    realAuthor: user.name,
                    date: new Date().toISOString(),
                    isAnonymous: isAnonymousReply,
                    isAdminPost: isAdmin && !isAnonymousReply
                };

                // Find latest topic data to append reply
                const updatedReplies = [...currentTopic.replies, newReply];

                if (window.db && currentTopic.dbId) {
                    try {
                        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';
                        const topicRef = window.FB.doc(window.db, 'artifacts', appId, 'public', 'data', 'forum_topics', currentTopic.dbId);
                        await window.FB.updateDoc(topicRef, { replies: updatedReplies });
                        // Local state update for immediate feel inside the current view
                        setCurrentTopic({ ...currentTopic, replies: updatedReplies });
                    } catch(err) {
                        alert("שגיאה בהוספת תגובה בענן.");
                    }
                } else {
                    const updatedTopics = topics.map(t => t.id === currentTopic.id ? { ...t, replies: updatedReplies } : t);
                    setTopics(updatedTopics);
                    setCurrentTopic({ ...currentTopic, replies: updatedReplies });
                }

                setNewReplyContent("");
                setIsAnonymousReply(false);
                setIsPublishing(false);
            };

            // Re-sync currentTopic if topics update from cloud
            React.useEffect(() => {
                if(currentTopic) {
                    const updated = topics.find(t => t.id === currentTopic.id);
                    if(updated) setCurrentTopic(updated);
                }
            }, [topics]);

            // VIEW 1: TOPIC LIST
            if (!currentTopic) {
                return (
                    <div className="max-w-5xl mx-auto space-y-8 animate-fade-in pb-12">
                        <div className="text-center mb-8">
                            <h2 className="text-3xl font-black text-brand-primary dark:text-white mb-3 flex items-center justify-center gap-3">
                                <Icon name="MessageSquare" size={32} className="text-brand-secondary" />
                                פורום התייעצויות ודיונים
                            </h2>
                            <p className="text-gray-600 dark:text-gray-400 text-lg">המקום לפתוח נושאים, לשאול שאלות וללמוד יחד.</p>
                        </div>

                        {/* Create Topic Form */}
                        <div className="bg-white dark:bg-gray-800 rounded-2xl shadow-md border border-gray-200 dark:border-gray-700 p-6 relative">
                            {!user && (
                                <div className="absolute inset-0 bg-white/60 dark:bg-gray-900/60 backdrop-blur-[2px] z-10 flex flex-col items-center justify-center rounded-2xl">
                                    <p className="text-lg font-bold text-brand-primary dark:text-white mb-3">יש להתחבר כדי לפתוח דיון</p>
                                    <button onClick={() => setShowAuthModal(true)} className="bg-brand-primary text-white px-6 py-2 rounded-full font-bold">התחברות</button>
                                </div>
                            )}
                            <h3 className="font-bold text-lg mb-4 flex items-center gap-2"><Icon name="Plus" size={20} className="text-brand-secondary"/> פתיחת נושא חדש לדיון</h3>
                            <form onSubmit={handleCreateTopic} className="space-y-4">
                                <input 
                                    type="text" value={newTopicTitle} onChange={e => setNewTopicTitle(e.target.value)} required
                                    placeholder="כותרת הנושא (לדוגמה: איך מתמחרים פגישה ראשונה?)"
                                    className="w-full border border-gray-200 dark:border-gray-700 rounded-xl px-4 py-3 bg-gray-50 dark:bg-gray-900 text-gray-800 dark:text-white focus:ring-2 focus:ring-brand-primary outline-none font-bold"
                                />
                                <textarea 
                                    value={newTopicContent} onChange={e => setNewTopicContent(e.target.value)} required
                                    placeholder="פרטו כאן את השאלה, הדילמה או התובנה שלכם..."
                                    className="w-full h-32 bg-gray-50 dark:bg-gray-900 border border-gray-200 dark:border-gray-700 rounded-xl p-4 focus:ring-2 focus:ring-brand-primary outline-none resize-none text-gray-800 dark:text-white"
                                ></textarea>
                                <div className="flex flex-col sm:flex-row items-center justify-between gap-4">
                                    <label className="flex items-center gap-2 text-sm text-gray-600 dark:text-gray-400 cursor-pointer">
                                        <input type="checkbox" checked={isAnonymousTopic} onChange={e => setIsAnonymousTopic(e.target.checked)} className="w-4 h-4 text-brand-primary rounded" />
                                        <Icon name="Ghost" size={16} /> פתח נושא בעילום שם
                                    </label>
                                    <button type="submit" disabled={isPublishing} className="bg-brand-secondary hover:bg-[#c15c3c] text-white px-8 py-2.5 rounded-full font-bold transition w-full sm:w-auto disabled:opacity-50 flex justify-center items-center gap-2">
                                        {isPublishing ? <Icon name="RefreshCw" className="animate-spin" size={18} /> : null} פרסם נושא
                                    </button>
                                </div>
                            </form>
                        </div>

                        {/* Topics List */}
                        <div className="space-y-4">
                            <h3 className="font-black text-xl text-brand-primary dark:text-white border-b-2 border-brand-secondary inline-block pb-1">נושאים אחרונים בפורום</h3>
                            {topics.length === 0 ? <p className="text-gray-500 py-6 text-center">אין נושאים עדיין. תהיו הראשונים!</p> : null}
                            {topics.map(topic => (
                                <div key={topic.id} onClick={() => setCurrentTopic(topic)} className="bg-white dark:bg-gray-800 rounded-xl shadow-sm border border-gray-100 dark:border-gray-700 p-5 hover:border-brand-primary hover:shadow-md transition-all cursor-pointer flex flex-col md:flex-row justify-between items-start md:items-center gap-4 group">
                                    <div className="flex-1">
                                        <h4 className="text-xl font-bold text-gray-800 dark:text-white group-hover:text-brand-primary transition-colors flex items-center gap-2">
                                            {topic.isAdminPost && <Icon name="ShieldCheck" size={18} className="text-brand-secondary" title="הודעת מערכת" />}
                                            {topic.title}
                                        </h4>
                                        <div className="flex items-center gap-3 text-sm text-gray-500 mt-2">
                                            <span className="flex items-center gap-1"><Icon name={topic.isAnonymous ? "Ghost" : "User"} size={14} /> {topic.author}</span>
                                            <span>•</span>
                                            <span>{formatDate(topic.date)}</span>
                                        </div>
                                    </div>
                                    <div className="bg-brand-primary/10 text-brand-primary dark:bg-gray-700 dark:text-gray-300 px-4 py-2 rounded-full font-bold text-sm flex items-center gap-2 shrink-0">
                                        <Icon name="MessageCircle" size={16} /> {topic.replies ? topic.replies.length : 0} תגובות
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                );
            }

            // VIEW 2: TOPIC DETAILS & REPLIES
            return (
                <div className="max-w-4xl mx-auto space-y-6 animate-fade-in pb-12">
                    <button onClick={() => setCurrentTopic(null)} className="text-gray-500 hover:text-brand-primary font-bold flex items-center gap-1 transition-colors mb-4 bg-white dark:bg-gray-800 px-4 py-2 rounded-full shadow-sm w-max border border-gray-200 dark:border-gray-700">
                        <Icon name="ChevronRight" size={20} /> חזרה לרשימת הנושאים
                    </button>

                    {/* Original Post */}
                    <div className={`bg-white dark:bg-gray-800 rounded-2xl shadow-md border ${currentTopic.isAdminPost ? 'border-brand-primary/50' : 'border-gray-200 dark:border-gray-700'} p-6 md:p-8`}>
                        <h2 className="text-2xl font-black text-brand-primary dark:text-white mb-4">{currentTopic.title}</h2>
                        <div className="flex items-center gap-3 mb-6 border-b border-gray-100 dark:border-gray-700 pb-4">
                            <div className={`w-12 h-12 rounded-full flex items-center justify-center text-white font-bold text-lg ${currentTopic.isAdminPost ? 'bg-brand-primary' : currentTopic.isAnonymous ? 'bg-gray-400' : 'bg-brand-secondary'}`}>
                                {currentTopic.isAdminPost ? <Icon name="Mountain" size={24} /> : currentTopic.isAnonymous ? <Icon name="Ghost" size={24} /> : currentTopic.author.charAt(0)}
                            </div>
                            <div>
                                <div className="font-bold text-gray-800 dark:text-white flex items-center gap-1">
                                    {currentTopic.author} {currentTopic.isAdminPost && <Icon name="CheckCircle" size={14} className="text-brand-primary" />}
                                </div>
                                <div className="text-xs text-gray-500">{formatDate(currentTopic.date)}</div>
                            </div>
                        </div>
                        <p className="text-gray-700 dark:text-gray-300 whitespace-pre-wrap leading-relaxed text-lg">{currentTopic.content}</p>
                    </div>

                    {/* Replies List */}
                    <div className="space-y-4 pl-0 md:pl-10">
                        <h3 className="font-bold text-lg text-gray-700 dark:text-gray-300 mr-2 border-b border-gray-200 dark:border-gray-700 pb-2">
                            תגובות ({currentTopic.replies ? currentTopic.replies.length : 0})
                        </h3>
                        {(!currentTopic.replies || currentTopic.replies.length === 0) && (
                            <p className="text-gray-500 text-center py-4 bg-gray-50 dark:bg-gray-800/50 rounded-xl">אין תגובות עדיין. היו הראשונים להגיב!</p>
                        )}
                        {currentTopic.replies && currentTopic.replies.map((reply, idx) => (
                            <div key={reply.id} className="bg-gray-50 dark:bg-gray-800 rounded-xl p-5 border border-gray-200 dark:border-gray-700 relative">
                                <div className="flex items-center gap-2 mb-2">
                                    <span className="font-bold text-sm text-gray-800 dark:text-white flex items-center gap-1">
                                        {reply.isAdminPost && <Icon name="ShieldCheck" size={14} className="text-brand-primary" />}
                                        {reply.author}
                                    </span>
                                    <span className="text-xs text-gray-400">• {formatDate(reply.date)}</span>
                                </div>
                                <p className="text-gray-700 dark:text-gray-300 text-sm md:text-base leading-relaxed">{reply.content}</p>
                            </div>
                        ))}
                    </div>

                    {/* Add Reply Form */}
                    <div className="bg-white dark:bg-gray-800 rounded-2xl shadow-sm border border-brand-primary/20 p-6 mt-8 relative pl-0 md:pl-10">
                        {!user && (
                            <div className="absolute inset-0 bg-white/60 dark:bg-gray-900/60 backdrop-blur-[2px] z-10 flex flex-col items-center justify-center rounded-2xl">
                                <button onClick={() => setShowAuthModal(true)} className="bg-brand-primary text-white px-6 py-2 rounded-full font-bold">התחברו כדי להגיב</button>
                            </div>
                        )}
                        <form onSubmit={handleAddReply}>
                            <textarea 
                                value={newReplyContent} onChange={e => setNewReplyContent(e.target.value)} required
                                placeholder="כתבו תגובה לנושא זה..."
                                className="w-full h-24 bg-gray-50 dark:bg-gray-900 border border-gray-200 dark:border-gray-700 rounded-xl p-4 focus:ring-2 focus:ring-brand-secondary outline-none resize-none text-gray-800 dark:text-white text-sm"
                            ></textarea>
                            <div className="flex flex-col sm:flex-row items-center justify-between mt-3 gap-3">
                                <label className="flex items-center gap-2 text-sm text-gray-500 cursor-pointer">
                                    <input type="checkbox" checked={isAnonymousReply} onChange={e => setIsAnonymousReply(e.target.checked)} className="rounded" /> פרסם כאנונימי
                                </label>
                                <button type="submit" disabled={isPublishing} className="bg-brand-primary hover:bg-brand-dark text-white px-6 py-2 rounded-full font-bold transition text-sm flex items-center gap-2">
                                    {isPublishing ? <Icon name="RefreshCw" className="animate-spin" size={16} /> : <Icon name="MessageSquare" size={16}/>} שלח תגובה
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            );
        };

        // ----------------------------------------------------
        // Youtube Free Channel Component
        // ----------------------------------------------------
        const YoutubePage = ({ onFileInteract, ytChannelId }) => {
            const [videos, setVideos] = React.useState([]);
            const [loading, setLoading] = React.useState(true);

            React.useEffect(() => {
                const fetchYouTubeRss = async () => {
                    try {
                        const cid = ytChannelId || 'UC_x5XG1OV2P6uZZ5FSM9Ttw'; 
                        const rssUrl = `https://www.youtube.com/feeds/videos.xml?channel_id=${cid}`;
                        const apiUrl = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(rssUrl)}`;
                        
                        const response = await fetch(apiUrl);
                        const data = await response.json();
                        
                        if (data.status === 'ok') {
                            const mappedVideos = data.items.map((item, idx) => ({
                                id: `yt_${idx}`, name: item.title, url: item.link, thumbnail: item.thumbnail, date: item.pubDate.split(' ')[0], type: 'youtube'
                            }));
                            setVideos(mappedVideos);
                        }
                    } catch (err) { console.log(err); }
                    setLoading(false);
                };
                fetchYouTubeRss();
            }, [ytChannelId]);

            return (
                <div className="max-w-6xl mx-auto space-y-8 animate-fade-in pb-12">
                    <div className="text-center mb-10 bg-red-50 dark:bg-red-900/10 p-8 rounded-3xl border border-red-100 dark:border-red-900/30">
                        <Icon name="Youtube" size={48} className="text-red-600 mx-auto mb-4" />
                        <h2 className="text-3xl font-black text-gray-800 dark:text-white mb-3">ספריית התוכן הפתוח</h2>
                        <p className="text-gray-600 dark:text-gray-400 text-lg max-w-2xl mx-auto">מבחר סרטונים והדרכות ישירות מערוץ היוטיוב של משה וולנר, פתוחים לכולם בחינם.</p>
                    </div>

                    {loading ? <div className="text-center py-12"><Icon name="RefreshCw" className="animate-spin mx-auto text-red-500 mb-4" size={32}/> טוען סרטונים...</div> : 
                        <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6">
                            {videos.map(video => (
                                <div key={video.id} onClick={() => onFileInteract(video)} className="bg-white dark:bg-gray-800 rounded-2xl shadow-md border border-gray-100 dark:border-gray-700 overflow-hidden hover:shadow-xl transition-all cursor-pointer group flex flex-col">
                                    <div className="relative aspect-video overflow-hidden bg-gray-200">
                                        {video.thumbnail && <img src={video.thumbnail} alt={video.name} className="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500" />}
                                        <div className="absolute inset-0 bg-black/40 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity">
                                            <Icon name="PlayCircle" size={48} className="text-white" />
                                        </div>
                                    </div>
                                    <div className="p-5 flex-1 flex flex-col">
                                        <h3 className="font-bold text-gray-800 dark:text-gray-200 leading-tight mb-2 flex-1" dir="rtl">{video.name}</h3>
                                    </div>
                                </div>
                            ))}
                        </div>
                    }
                </div>
            );
        };

        // ----------------------------------------------------
        // Global Modal for viewing files
        // ----------------------------------------------------
        const GlobalFileViewer = ({ file, onClose }) => {
            if (!file) return null;
            const getEmbedUrl = (file) => {
                if (file.type === 'youtube' || file.url.includes('youtube.com') || file.url.includes('youtu.be')) {
                    const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
                    const match = file.url.match(regExp);
                    if (match && match[2].length === 11) return `https://www.youtube.com/embed/${match[2]}?autoplay=1`;
                }
                if (file.url.includes('drive.google.com')) return file.url.replace(/\/view.*$/, '/preview');
                return file.url;
            };
            const embedUrl = getEmbedUrl(file);
            const isYoutube = file.type === 'youtube' || embedUrl.includes('youtube.com/embed');

            return (
                <div className="fixed inset-0 z-[9999] flex items-center justify-center bg-black/90 backdrop-blur-sm p-2 md:p-8 animate-fade-in">
                    <div className="bg-black w-full max-w-6xl h-full md:h-[85vh] rounded-2xl overflow-hidden flex flex-col shadow-2xl border border-gray-800">
                        <div className="bg-gray-900 text-white p-4 flex justify-between items-center shadow-md z-10">
                            <div className="flex items-center gap-3 truncate pr-4">
                                <Icon name={isYoutube ? "Youtube" : "PlayCircle"} size={24} className={isYoutube ? "text-red-500" : "text-brand-secondary"} />
                                <h3 className="font-bold text-lg truncate" dir="rtl">{file.name}</h3>
                            </div>
                            <button onClick={onClose} className="p-2 hover:bg-gray-800 rounded-full transition-colors shrink-0"><Icon name="X" size={24} /></button>
                        </div>
                        <div className="flex-1 relative w-full h-full bg-black flex items-center justify-center">
                            {embedUrl ? <iframe src={embedUrl} className="w-full h-full border-none absolute inset-0" allow="autoplay; fullscreen" allowFullScreen title={file.name}></iframe> : 
                            <a href={file.url} target="_blank" rel="noopener noreferrer" className="bg-brand-primary text-white px-6 py-3 rounded-full flex items-center gap-2">פתיחת הקובץ בחלון חדש <Icon name="ExternalLink" size={16} /></a>}
                        </div>
                    </div>
                </div>
            );
        };

        // ----------------------------------------------------
        // Main App Component
        // ----------------------------------------------------
        const App = () => {
            const [showSplash, setShowSplash] = React.useState(true);
            const [isDarkMode, setIsDarkMode] = React.useState(() => localStorage.getItem('darkMode') === 'true');
            
            const [user, setUser] = React.useState(() => {
                const savedUser = localStorage.getItem('pisga_user');
                return savedUser ? JSON.parse(savedUser) : null;
            });
            const [courses, setCourses] = React.useState(() => {
                const saved = localStorage.getItem('pisga_courses');
                return saved ? JSON.parse(saved) : INITIAL_COURSES;
            });
            const [forumTopics, setForumTopics] = React.useState(() => {
                const saved = localStorage.getItem('pisga_forum_topics');
                return saved ? JSON.parse(saved) : INITIAL_FORUM_TOPICS;
            });
            const [ytChannelId, setYoutubeId] = React.useState(localStorage.getItem('pisga_yt_id') || "");
            
            const [currentPage, setCurrentPage] = React.useState('home');
            const [isMobileMenuOpen, setIsMobileMenuOpen] = React.useState(false);
            const [globalFile, setGlobalFile] = React.useState(null);
            const [alertMessage, setAlertMessage] = React.useState(null);

            // Modals State
            const [showAuthModal, setShowAuthModal] = React.useState(false);
            const [showPaymentModal, setShowPaymentModal] = React.useState(false);
            const [authName, setAuthName] = React.useState('');
            const [authPass, setAuthPass] = React.useState('');
            const [showPassField, setShowPassField] = React.useState(false);

            // Cloud DB State
            const [fbUser, setFbUser] = React.useState(null);

            React.useEffect(() => { setTimeout(() => setShowSplash(false), 2000); }, []);
            React.useEffect(() => { document.documentElement.classList.toggle('dark', isDarkMode); localStorage.setItem('darkMode', isDarkMode); }, [isDarkMode]);
            React.useEffect(() => { localStorage.setItem('pisga_courses', JSON.stringify(courses)); }, [courses]);
            React.useEffect(() => { if (!window.db) localStorage.setItem('pisga_forum_topics', JSON.stringify(forumTopics)); }, [forumTopics]);

            // Reveal Password Field if Admin Name typed
            React.useEffect(() => {
                if(authName.includes('משה וולנר') || authName.includes('מנהל')) {
                    setShowPassField(true);
                } else {
                    setShowPassField(false);
                }
            }, [authName]);

            // --- Cloud Setup (Firebase / Firestore) ---
            React.useEffect(() => {
                if (!window.FB) return;
                try {
                    const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : null;
                    if (!firebaseConfig) return;
                    
                    const app = window.FB.initializeApp(firebaseConfig);
                    const auth = window.FB.getAuth(app);
                    window.db = window.FB.getFirestore(app);
                    
                    const initAuth = async () => {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await window.FB.signInWithCustomToken(auth, __initial_auth_token);
                        } else {
                            await window.FB.signInAnonymously(auth);
                        }
                    };
                    initAuth();
                    
                    const unsubscribe = window.FB.onAuthStateChanged(auth, setFbUser);
                    return () => unsubscribe();
                } catch(e) { console.log("Cloud db not configured, falling back to local storage.", e); }
            }, []);

            // --- Fetch Posts from Cloud ---
            React.useEffect(() => {
                if (!fbUser || !window.db) return;
                const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';
                const q = window.FB.collection(window.db, 'artifacts', appId, 'public', 'data', 'forum_topics');
                
                const unsubscribe = window.FB.onSnapshot(q, (snapshot) => {
                    const topics = [];
                    snapshot.forEach(doc => {
                        topics.push({ dbId: doc.id, ...doc.data() });
                    });
                    topics.sort((a, b) => new Date(b.date) - new Date(a.date));
                    setForumTopics(topics);
                }, (error) => { console.error("Cloud Error: ", error); });
                return () => unsubscribe();
            }, [fbUser]);

            const handleAuthSubmit = (e) => {
                e.preventDefault();
                let isAdmin = false;
                
                // Secure Admin Check
                if (showPassField) {
                    if (authPass === ADMIN_PASSWORD) {
                        isAdmin = true;
                    } else {
                        setAlertMessage({title: "שגיאת התחברות", text: "סיסמת מנהל שגויה."});
                        return;
                    }
                }

                const loggedUser = { name: authName || 'משתמש', isSubscribed: isAdmin, isAdmin: isAdmin };
                localStorage.setItem('pisga_user', JSON.stringify(loggedUser));
                setUser(loggedUser);
                setShowAuthModal(false);
                setAuthPass(''); // clear pass
                setAlertMessage({title: "התחברת בהצלחה", text: `ברוך הבא, ${loggedUser.name}!`});
            };

            const handleLogout = () => { localStorage.removeItem('pisga_user'); setUser(null); };

            const handlePaymentSuccess = (subscriptionID) => {
                const finalUser = user ? { ...user, isSubscribed: true, subId: subscriptionID } : { name: 'חבר מועדון', isSubscribed: true, subId: subscriptionID };
                localStorage.setItem('pisga_user', JSON.stringify(finalUser));
                setUser(finalUser);
                setShowPaymentModal(false);
                setAlertMessage({title: "תשלום אושר", text: "תודה רבה! המנוי שלך אושר בהצלחה. כעת כל הקורסים פתוחים עבורך."});
            };

            React.useEffect(() => {
                const handleHashChange = () => {
                    const hash = window.location.hash.replace('#', '') || 'home';
                    setCurrentPage(hash);
                };
                handleHashChange(); 
                window.addEventListener('hashchange', handleHashChange);
                return () => window.removeEventListener('hashchange', handleHashChange);
            }, []);

            React.useEffect(() => { window.scrollTo(0, 0); }, [currentPage]);

            const navigate = (pageId) => { window.location.hash = pageId; setIsMobileMenuOpen(false); };

            const navItems = [
                { id: 'home', label: 'ראשי', icon: 'Home' },
                { id: 'explorer', label: 'קורסי המועדון (פרו)', icon: 'FolderOpen' },
                { id: 'forum', label: 'פורום קהילתי', icon: 'MessageSquare' },
                { id: 'youtube', label: 'תוכן חופשי', icon: 'Youtube' }
            ];

            const renderPage = () => {
                if(currentPage === 'admin' && user?.isAdmin) return <AdminPage forumTopics={forumTopics} setForumTopics={setForumTopics} setMessage={(msg) => setAlertMessage({title: "ניהול פנימי", text: msg})} />;
                switch(currentPage) {
                    case 'explorer': return <ExplorerPage onFileInteract={setGlobalFile} user={user} setShowPayment={setShowPaymentModal} courses={courses} />;
                    case 'forum': return <ForumPage user={user} setShowAuthModal={setShowAuthModal} topics={forumTopics} setTopics={setForumTopics} />;
                    case 'youtube': return <YoutubePage onFileInteract={setGlobalFile} ytChannelId={ytChannelId} />;
                    default: return <HomePage navigate={navigate} />;
                }
            };

            return (
                <div className="min-h-screen flex flex-col font-sans relative pb-20 md:pb-0 bg-gray-50 dark:bg-[#0b1b24]">
                    {showSplash && <SplashScreen />}
                    {alertMessage && <CustomMessageBox title={alertMessage.title} message={alertMessage.text} onClose={() => setAlertMessage(null)} />}
                    <GlobalFileViewer file={globalFile} onClose={() => setGlobalFile(null)} />
                    
                    <header className="bg-white dark:bg-gray-900 shadow-sm sticky top-0 z-50 border-b-4 border-brand-secondary">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                            <div className="flex justify-between items-center h-20">
                                <div className="flex items-center gap-3 cursor-pointer group" onClick={() => navigate('home')}>
                                    <Icon name="Mountain" size={36} className="text-brand-primary dark:text-brand-secondary group-hover:scale-110 transition-transform" />
                                    <div><h1 className="font-black text-xl text-brand-primary dark:text-white leading-none">פסגה</h1></div>
                                </div>

                                <div className="flex items-center gap-2 sm:gap-4">
                                    <nav className="hidden lg:flex gap-1">
                                        {navItems.map(item => (
                                            <button key={item.id} onClick={() => navigate(item.id)} className={`px-4 py-2 rounded-full flex items-center gap-2 font-bold transition-all text-sm ${currentPage === item.id ? 'bg-brand-primary text-white dark:bg-brand-secondary' : 'text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-800'}`}>
                                                <Icon name={item.icon} size={18} /> {item.label}
                                            </button>
                                        ))}
                                        {user?.isAdmin && (
                                            <button onClick={() => navigate('admin')} className={`px-4 py-2 rounded-full flex items-center gap-2 font-bold transition-all text-sm ${currentPage === 'admin' ? 'bg-gray-800 text-white' : 'text-gray-600 hover:bg-gray-200'}`}>
                                                <Icon name="Settings" size={18} /> ניהול
                                            </button>
                                        )}
                                    </nav>

                                    <div className="w-px h-6 bg-gray-200 dark:bg-gray-700 hidden lg:block mx-2"></div>

                                    <div className="flex items-center gap-2">
                                        {!user ? (
                                            <button onClick={() => setShowAuthModal(true)} className="text-sm font-bold text-brand-primary border border-brand-primary/30 rounded-full px-4 py-1.5 hover:bg-brand-primary hover:text-white transition">התחברות</button>
                                        ) : (
                                            <div className="flex items-center gap-3 bg-gray-100 dark:bg-gray-800 px-3 py-1.5 rounded-full">
                                                <span className="text-sm font-bold truncate max-w-[100px]">{user.name}</span>
                                                <button onClick={handleLogout} className="text-gray-400 hover:text-red-500 p-1"><Icon name="LogOut" size={16} /></button>
                                            </div>
                                        )}
                                    </div>

                                    <button onClick={() => setIsDarkMode(!isDarkMode)} className="hidden sm:block p-2 text-gray-500 hover:text-brand-primary rounded-full"><Icon name={isDarkMode ? "Sun" : "Moon"} size={20} /></button>
                                    <button onClick={() => setIsMobileMenuOpen(!isMobileMenuOpen)} className="lg:hidden p-2 text-brand-primary"><Icon name={isMobileMenuOpen ? "X" : "Menu"} size={26} /></button>
                                </div>
                            </div>
                        </div>

                        {isMobileMenuOpen && (
                            <div className="lg:hidden border-t border-gray-100 dark:border-gray-800 bg-white dark:bg-gray-900 absolute w-full shadow-2xl pb-4 z-40">
                                <div className="px-4 pt-4 pb-4 space-y-2">
                                    {navItems.map(item => (
                                        <button key={item.id} onClick={() => navigate(item.id)} className="w-full text-right px-4 py-3 rounded-xl flex items-center gap-3 font-bold text-gray-700 dark:text-gray-200"><Icon name={item.icon} size={20} /> {item.label}</button>
                                    ))}
                                    {user?.isAdmin && <button onClick={() => navigate('admin')} className="w-full text-right px-4 py-3 rounded-xl flex items-center gap-3 font-bold text-brand-primary"><Icon name="Settings" size={20} /> ניהול פורום</button>}
                                </div>
                            </div>
                        )}
                    </header>

                    {showAuthModal && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center bg-black/60 backdrop-blur-sm p-4 animate-fade-in">
                            <div className="bg-white dark:bg-gray-800 rounded-3xl p-8 max-w-sm w-full text-center relative shadow-2xl">
                                <button onClick={() => setShowAuthModal(false)} className="absolute top-4 left-4 p-2 bg-gray-100 rounded-full"><Icon name="X" size={20} /></button>
                                <div className="w-16 h-16 bg-brand-primary/10 rounded-full flex items-center justify-center mx-auto mb-4 text-brand-primary"><Icon name="User" size={32} /></div>
                                <h3 className="text-2xl font-bold mb-6 text-gray-800 dark:text-white">התחברות</h3>
                                <form onSubmit={handleAuthSubmit} className="space-y-4">
                                    <input type="text" required value={authName} onChange={e=>setAuthName(e.target.value)} placeholder="הזן שם מלא" className="w-full border border-gray-200 dark:border-gray-700 rounded-xl px-4 py-3 bg-gray-50 dark:bg-gray-900 focus:border-brand-primary outline-none" />
                                    
                                    {showPassField && (
                                        <div className="animate-fade-in">
                                            <input type="password" required value={authPass} onChange={e=>setAuthPass(e.target.value)} placeholder="הזן סיסמת מנהל" className="w-full border border-gray-200 dark:border-gray-700 rounded-xl px-4 py-3 bg-brand-primary/5 focus:border-brand-primary outline-none" />
                                            <p className="text-xs text-brand-secondary mt-2 font-bold text-right">דרושה סיסמת מנהל לצורך אימות.</p>
                                        </div>
                                    )}

                                    <button type="submit" className="w-full bg-brand-primary hover:bg-brand-dark text-white font-bold py-3 rounded-xl transition">היכנס</button>
                                </form>
                            </div>
                        </div>
                    )}

                    {showPaymentModal && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center bg-black/80 p-4 overflow-y-auto animate-fade-in">
                            <div className="relative w-full max-w-md my-8">
                                <button onClick={() => setShowPaymentModal(false)} className="absolute -top-12 right-0 text-white bg-white/20 hover:bg-white/40 p-2 rounded-full transition"><Icon name="X" size={24} /></button>
                                <PayPalSubscription onSuccess={handlePaymentSuccess} />
                            </div>
                        </div>
                    )}

                    <main className="flex-1 w-full pb-16 pt-8 relative z-10">
                        {renderPage()}
                    </main>

                    <a href={WHATSAPP_LINK} target="_blank" rel="noopener noreferrer" className="whatsapp-float" title="הצטרפו לקבוצת הוואטסאפ">
                        <Icon name="MessageCircle" size={32} />
                    </a>

                    <footer className="bg-brand-dark text-white py-10 mt-auto">
                        <div className="max-w-7xl mx-auto px-4 text-center">
                            <h2 className="text-2xl font-black mb-2">קהילת פסגה</h2>
                            <p className="text-gray-400 mb-6">הבית העסקי למאמנים ומטפלים בהובלת משה וולנר</p>
                            <p className="text-sm text-gray-500">© {new Date().getFullYear()} כל הזכויות שמורות.</p>
                        </div>
                    </footer>
                </div>
            );
        };

        const initReact = () => {
            const root = ReactDOM.createRoot(document.getElementById('root'));
            root.render(<App />);
        };
        
        if (window.FB) { initReact(); } else { window.addEventListener('firebaseReady', initReact); }
    </script>
</body>
</html>
