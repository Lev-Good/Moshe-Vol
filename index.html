        const useCSVData = (url, mapRowFn, cacheKey) => {
            const [data, setData] = React.useState(() => {
                try { const cached = localStorage.getItem(cacheKey); return cached ? JSON.parse(cached) : []; } 
                catch(e) { return []; }
            });
            const [loading, setLoading] = React.useState(data.length === 0);
            const [error, setError] = React.useState(null);

            React.useEffect(() => {
                if (!window.Papa) return;
                window.Papa.parse(url, {
                    download: true, header: true, skipEmptyLines: true,
                    complete: (results) => {
                        try {
                            const mapped = results.data.map(mapRowFn).filter(Boolean);
                            setData(mapped);
                            localStorage.setItem(cacheKey, JSON.stringify(mapped));
                            setLoading(false);
                        } catch (err) { setError(err.message); setLoading(false); }
                    },
                    error: (err) => { setError(err.message); setLoading(false); }
                });
            }, [url, cacheKey]);

            return { data, loading, error };
        };

            return {

                    const id = f.url.match(/(?:youtu\.be\/|youtube\.com\/(?:embed\/|v\/|watch\?v=|watch\?.+&v=))([^&]{11})/);

            const [showSplash, setShowSplash] = React.useState(true);
            const [user, setUser] = React.useState(() => JSON.parse(localStorage.getItem('pisga_user')) || null);
            const [localHistory, setLocalHistory] = React.useState(() => JSON.parse(localStorage.getItem('pisga_history')) || []);
            const [courses, setCourses] = React.useState(() => JSON.parse(localStorage.getItem('pisga_courses')) || INITIAL_COURSES);
            const [forumTopics, setForumTopics] = React.useState([]);
            const [currentPage, setCurrentPage] = React.useState('home');
            const [globalFile, setGlobalFile] = React.useState(null);
            const [alertMsg, setAlertMsg] = React.useState(null);
            
            const [isMobileMenuOpen, setIsMobileMenuOpen] = React.useState(false);
            const [showBackToTop, setShowBackToTop] = React.useState(false);
            const [showA11y, setShowA11y] = React.useState(false);
            const [isDarkMode, setIsDarkMode] = React.useState(() => localStorage.getItem('darkMode') === 'true');

            const [showAuthModal, setShowAuthModal] = React.useState(false);
            const [showPaymentModal, setShowPaymentModal] = React.useState(false);
            const [authName, setAuthName] = React.useState('');
            const [authPass, setAuthPass] = React.useState('');

            React.useEffect(() => { setTimeout(() => setShowSplash(false), 2000); }, []);
            
            React.useEffect(() => {
                document.documentElement.classList.toggle('dark', isDarkMode);
                localStorage.setItem('darkMode', isDarkMode);
            }, [isDarkMode]);

            React.useEffect(() => {
                const handleScroll = () => setShowBackToTop(window.scrollY > 300);
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            React.useEffect(() => {
                if (!window.FB) return;
                const unsubscribe = window.FB.onAuthStateChanged(window.FB.auth, (fbUser) => {
                    if (fbUser && !user) window.FB.signInAnonymously(window.FB.auth);
                });
                const q = window.FB.query(window.FB.collection(window.FB.db, 'pisga_forum'));
                const unsubForum = window.FB.onSnapshot(q, (snapshot) => {
                    const list = [];
                    snapshot.forEach(doc => list.push({ id: doc.id, ...doc.data() }));
                    setForumTopics(list.sort((a,b) => new Date(b.date) - new Date(a.date)));
                });
                return () => { unsubscribe(); unsubForum(); };
            }, []);

            const saveToHistoryAndOpen = (item) => {
                setGlobalFile(item);
                if (!user) return;
                const d = new Date();
                const dateStr = `${d.getDate().toString().padStart(2, '0')}/${(d.getMonth()+1).toString().padStart(2, '0')}/${d.getFullYear()} ${d.getHours().toString().padStart(2, '0')}:${d.getMinutes().toString().padStart(2, '0')}`;
                
                const newItem = { name: item.name, type: item.type, url: item.url, lastWatched: dateStr };
                const newHistory = [newItem, ...localHistory.filter(h => h.name !== item.name)].slice(0, 50); 
                setLocalHistory(newHistory);
                localStorage.setItem('pisga_history', JSON.stringify(newHistory));
            };

            const handleAuth = (e) => {
                e.preventDefault();
                const isAdmin = authName.includes("משה וולנר") || authName.includes("מנהל");
                if (isAdmin && authPass !== ADMIN_PASSWORD) return setAlertMsg({t: "שגיאה", m: "סיסמת מנהל שגויה"});
                const newUser = { name: authName, isSubscribed: isAdmin, isAdmin };
                localStorage.setItem('pisga_user', JSON.stringify(newUser));
                setUser(newUser); setShowAuthModal(false); setAuthPass('');
            };

            const navigate = (id) => { window.location.hash = id; setCurrentPage(id); setIsMobileMenuOpen(false); };
            React.useEffect(() => { 
                const h = window.location.hash.replace('#','') || 'home';
                setCurrentPage(h);
            }, []);

            // A11y Functions
            const toggleA11yMenu = () => setShowA11y(!showA11y);
            const changeFontSize = (step) => document.body.style.fontSize = `${parseFloat(getComputedStyle(document.body).fontSize || 16) + step}px`;
            const toggleReadableFont = () => document.body.classList.toggle('a11y-readable-font');
            const toggleHighlightLinks = () => document.body.classList.toggle('a11y-highlight-links');
            const resetA11y = () => { document.body.style.fontSize = ''; document.body.classList.remove('a11y-readable-font', 'a11y-highlight-links'); setShowA11y(false); };

            const navItems = [
                {id:'home', l:'ראשי', i:'Home'},
                {id:'explorer', l:'קורסים', i:'FolderOpen'},
                {id:'forum', l:'פורום', i:'MessageSquare'},
                {id:'schedule', l:'לו"ז', i:'Calendar'},
                {id:'articles', l:'מאמרים', i:'BookOpen'},
                {id:'history', l:'היסטוריה', i:'History'},
                {id:'youtube', l:'חינם', i:'Youtube'},
                {id:'about', l:'אודות', i:'Info'}
            ];

            return (
                <div className="min-h-screen flex flex-col bg-gray-50 dark:bg-[#0b1b24] font-sans relative">
                    {showSplash && <SplashScreen />}
                    {alertMsg && <CustomMessageBox title={alertMsg.t} message={alertMsg.m} onClose={()=>setAlertMsg(null)} />}
                    <GlobalFileViewer file={globalFile} onClose={()=>setGlobalFile(null)} />
                    
                    <header className="bg-white dark:bg-gray-900 shadow-sm sticky top-0 z-50 border-b-4 border-brand-secondary">
                        <div className="max-w-7xl mx-auto px-4 h-20 flex justify-between items-center">
                            <div onClick={()=>navigate('home')} className="flex items-center gap-3 cursor-pointer">
                                <Icon name="Mountain" className="text-brand-primary" size={36} />
                                <h1 className="font-black text-xl text-brand-primary dark:text-white hidden sm:block">פסגה</h1>
                            </div>
                            <nav className="hidden lg:flex gap-1 overflow-x-auto scrollbar-hide px-2">
                                {navItems.map(n => (
                                    <button key={n.id} onClick={()=>navigate(n.id)} className={`px-3 py-2 rounded-full font-bold text-sm flex items-center gap-1.5 whitespace-nowrap ${currentPage===n.id?'bg-brand-primary/10 text-brand-primary dark:bg-brand-secondary/20 dark:text-brand-secondary':'text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-800'}`}>
                                        <Icon name={n.i} size={16}/> {n.l}
                                    </button>
                                ))}
                                {user?.isAdmin && <button onClick={()=>navigate('admin')} className="px-3 py-2 rounded-full font-bold text-sm bg-gray-800 text-white flex items-center gap-1.5"><Icon name="Settings" size={16}/> ניהול</button>}
                            </nav>
                            <div className="flex items-center gap-2 sm:gap-4">
                                {!user ? <button onClick={()=>setShowAuthModal(true)} className="text-sm font-bold text-brand-primary border border-brand-primary/30 px-3 sm:px-4 py-1.5 rounded-full hover:bg-brand-primary hover:text-white transition">התחברות</button> : 
                                <div className="flex items-center gap-2 bg-gray-100 dark:bg-gray-800 p-1.5 px-3 rounded-full border border-gray-200 dark:border-gray-700">
                                    <span className="text-xs font-bold text-gray-800 dark:text-gray-200 truncate max-w-[80px]">{user.name}</span>
                                    <button onClick={()=>{localStorage.removeItem('pisga_user');setUser(null);navigate('home')}} className="text-gray-400 hover:text-red-500"><Icon name="LogOut" size={16}/></button>
                                </div>}
                                <div className="flex items-center gap-1">
                                    <button onClick={() => setIsDarkMode(!isDarkMode)} className="p-2 text-gray-500 hover:text-brand-primary dark:hover:text-white rounded-full"><Icon name={isDarkMode ? "Sun" : "Moon"} size={20} /></button>
                                    <button onClick={toggleA11yMenu} className="p-2 text-gray-500 hover:text-brand-primary dark:hover:text-white rounded-full"><Icon name="Accessibility" size={20} /></button>
                                </div>
                                <button onClick={()=>setIsMobileMenuOpen(!isMobileMenuOpen)} className="lg:hidden p-1 text-brand-primary dark:text-white"><Icon name={isMobileMenuOpen ? "X" : "Menu"} size={26}/></button>
                            </div>
                        </div>
                    </header>

                    {isMobileMenuOpen && (
                        <div className="lg:hidden border-t border-gray-100 dark:border-gray-800 bg-white dark:bg-gray-900 absolute w-full shadow-2xl pb-4 z-40">
                            <div className="px-4 pt-4 pb-4 space-y-2">
                                {navItems.map(item => (
                                    <button key={item.id} onClick={() => navigate(item.id)} className="w-full text-right px-4 py-3 rounded-xl flex items-center gap-3 font-bold text-gray-700 dark:text-gray-200 hover:bg-gray-50 dark:hover:bg-gray-800"><Icon name={item.icon} size={20} /> {item.label}</button>
                                ))}
                                {user?.isAdmin && <button onClick={() => navigate('admin')} className="w-full text-right px-4 py-3 rounded-xl flex items-center gap-3 font-bold text-brand-primary"><Icon name="Settings" size={20} /> ניהול</button>}
                            </div>
                        </div>
                    )}

                    {showAuthModal && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center bg-black/60 p-4 animate-fade-in">
                            <div className="bg-white dark:bg-gray-800 rounded-3xl p-8 max-w-sm w-full text-center relative shadow-2xl">
                                <button onClick={()=>setShowAuthModal(false)} className="absolute top-4 left-4 p-2 bg-gray-100 dark:bg-gray-700 rounded-full"><Icon name="X" size={20}/></button>
                                <Icon name="User" size={32} className="mx-auto mb-4 text-brand-primary dark:text-brand-secondary" />
                                <h3 className="text-2xl font-bold mb-6 text-gray-800 dark:text-white">התחברות</h3>
                                <form onSubmit={handleAuth} className="space-y-4">
                                    <input type="text" required value={authName} onChange={e=>setAuthName(e.target.value)} placeholder="שם מלא" className="w-full border dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-800 dark:text-white rounded-xl px-4 py-3 outline-none" />
                                    {(authName.includes("משה וולנר") || authName.includes("מנהל")) && <input type="password" required value={authPass} onChange={e=>setAuthPass(e.target.value)} placeholder="סיסמת מנהל" className="w-full border dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-800 dark:text-white rounded-xl px-4 py-3 outline-none" />}
                                    <button type="submit" className="w-full bg-brand-primary text-white font-bold py-3 rounded-xl">היכנס</button>
                                </form>
                            </div>
                        </div>
                    )}

                    {showPaymentModal && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center bg-black/80 p-4 animate-fade-in overflow-y-auto">
                            <div className="relative w-full max-w-md my-8">
                                <button onClick={()=>setShowPaymentModal(false)} className="absolute -top-12 right-0 text-white bg-white/20 p-2 rounded-full"><Icon name="X" size={24}/></button>
                                <PayPalSubscription onSuccess={(id)=>{ const u={...user, isSubscribed:true}; setUser(u); localStorage.setItem('pisga_user', JSON.stringify(u)); setShowPaymentModal(false); setAlertMsg({t:"תודה",m:"המנוי הופעל בהצלחה!"}) }} />
                            </div>
                        </div>
                    )}

                    {showA11y && (
                        <div className="fixed top-24 left-4 sm:left-8 z-[100] flex flex-col items-start animate-fade-in">
                            <div className="bg-white dark:bg-gray-800 p-5 rounded-2xl shadow-2xl border-2 border-brand-secondary mb-3 w-64 text-right">
                                <div className="flex justify-between items-center mb-4 border-b border-gray-200 dark:border-gray-700 pb-3">
                                    <button onClick={toggleA11yMenu} className="text-gray-400 hover:text-red-500 transition"><Icon name="X" size={20} /></button>
                                    <h3 className="font-bold text-brand-primary dark:text-white flex items-center gap-2">נגישות <Icon name="Accessibility" size={20} className="text-brand-secondary" /></h3>
                                </div>
                                <div className="space-y-2.5">
                                    <button onClick={() => changeFontSize(2)} className="w-full bg-gray-50 dark:bg-gray-700 text-gray-800 dark:text-white px-4 py-2.5 rounded-xl text-sm font-bold flex justify-between items-center">הגדל טקסט <Icon name="ZoomIn" size={16} /></button>
                                    <button onClick={() => changeFontSize(-2)} className="w-full bg-gray-50 dark:bg-gray-700 text-gray-800 dark:text-white px-4 py-2.5 rounded-xl text-sm font-bold flex justify-between items-center">הקטן טקסט <Icon name="ZoomOut" size={16} /></button>
                                    <button onClick={toggleHighlightLinks} className="w-full bg-gray-50 dark:bg-gray-700 text-gray-800 dark:text-white px-4 py-2.5 rounded-xl text-sm font-bold flex justify-between items-center">הדגשת קישורים <Icon name="Underline" size={16} /></button>
                                    <button onClick={toggleReadableFont} className="w-full bg-gray-50 dark:bg-gray-700 text-gray-800 dark:text-white px-4 py-2.5 rounded-xl text-sm font-bold flex justify-between items-center">גופן קריא <Icon name="Type" size={16} /></button>
                                    <div className="w-full h-px bg-gray-200 dark:bg-gray-700 my-2"></div>
                                    <button onClick={resetA11y} className="w-full bg-red-50 dark:bg-red-900/30 text-red-600 px-4 py-2.5 rounded-xl text-sm font-bold flex justify-between items-center">איפוס הגדרות <Icon name="RefreshCw" size={16} /></button>
                                </div>
                            </div>
                        </div>
                    )}

                    <main className="flex-1 pb-20 pt-8">
                        {currentPage==='admin' && user?.isAdmin ? <AdminPage forumTopics={forumTopics} setForumTopics={setForumTopics} setMessage={(m)=>setAlertMsg({t:"ניהול",m})} /> : 
                         currentPage==='explorer' ? <ExplorerPage courses={courses} user={user} onFileInteract={saveToHistoryAndOpen} setShowPayment={setShowPaymentModal} /> : 
                         currentPage==='forum' ? <ForumPage topics={forumTopics} user={user} setShowAuthModal={setShowAuthModal} /> : 
                         currentPage==='schedule' ? <SchedulePage /> :
                         currentPage==='articles' ? <ArticlesPage /> :
                         currentPage==='about' ? <AboutPage /> :
                         currentPage==='history' ? <HistoryPage localHistory={localHistory} onFileInteract={saveToHistoryAndOpen} /> :
                         currentPage==='youtube' ? <YoutubePage onFileInteract={saveToHistoryAndOpen} /> : 
                         <HomePage navigate={navigate} />}
                    </main>

                    <button 
                        onClick={() => window.scrollTo({top: 0, behavior: 'smooth'})} 
                        className={`fixed bottom-20 sm:bottom-8 right-6 sm:left-6 sm:right-auto bg-brand-primary text-white p-3 rounded-full shadow-xl transition-all duration-300 z-40 hover:scale-110 ${showBackToTop ? 'opacity-100 translate-y-0' : 'opacity-0 translate-y-10 pointer-events-none'}`}
                    >
                        <Icon name="ArrowUp" size={24} />
                    </button>

                    <a href={WHATSAPP_LINK} target="_blank" className="whatsapp-float"><Icon name="MessageCircle" size={32}/></a>
                    
                    <footer className="bg-brand-dark dark:bg-gray-900 text-white py-10 transition-colors border-t-4 border-brand-secondary relative z-10">
                        <div className="max-w-7xl mx-auto px-4 text-center">
                            <h2 className="text-2xl font-black mb-2">קהילת פסגה</h2>
                            <p className="text-gray-400 mb-6">הבית העסקי למאמנים ומטפלים בהובלת משה וולנר</p>
                            <p className="text-sm text-gray-500 mb-1">© {new Date().getFullYear()} כל הזכויות שמורות.</p>
                            <p className="mt-3 text-sm text-brand-light/60 bg-black/20 inline-block px-4 py-1.5 rounded-full">
                                נבנה על ידי <a href="https://lev-good.github.io/Good-heart/" target="_blank" rel="noopener noreferrer" className="text-brand-secondary hover:text-white font-bold transition">לב טוב</a>
                            </p>
                        </div>
                    </footer>
                </div>
            );
        };

        const init = () => ReactDOM.createRoot(document.getElementById('root')).render(<App />);
        if (window.FB) init(); else window.addEventListener('firebaseReady', init);
    </script>
</body>
</html>
